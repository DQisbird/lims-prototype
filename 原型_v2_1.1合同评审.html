<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#333}
.app{display:flex;height:100vh}
.sidebar{width:240px;background:#001529;color:#fff;overflow-y:auto;flex-shrink:0}
.sidebar .logo{padding:16px;font-size:17px;font-weight:bold;border-bottom:1px solid #002140;display:flex;align-items:center;gap:8px}
.sidebar .logo .icon{width:32px;height:32px;background:#1890ff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px}
.nav{padding:8px 0}
.nav-parent{padding:10px 20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.nav-parent:hover{background:#002140}
.nav-parent .arrow{font-size:10px;transition:transform .2s}
.nav-parent.open .arrow{transform:rotate(90deg)}
.nav-children{display:none;background:#000c17}
.nav-parent.open+.nav-children{display:block}
.nav-child{padding:8px 20px 8px 36px;font-size:12px;cursor:pointer;transition:background .2s}
.nav-child:hover{background:#002140}
.nav-child.active{background:#1890ff;color:#fff}
.nav-badge{float:right;background:#ff4d4f;color:#fff;font-size:11px;min-width:18px;height:18px;line-height:18px;text-align:center;border-radius:9px;padding:0 5px;margin-top:1px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 20px;font-size:14px;justify-content:space-between}
.header .user{font-size:13px;color:#666}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:16px;font-weight:bold;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.toolbar input{width:160px}
.btn{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#1890ff;color:#fff}
.btn-success{background:#52c41a;color:#fff}
.btn-warning{background:#faad14;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-default{background:#fff;color:#333;border:1px solid #d9d9d9}
.btn-sm{padding:3px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0}
th{background:#fafafa;font-weight:600;color:#555}
tr:hover{background:#fafafa}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500}
.tag-blue{background:#e6f7ff;color:#1890ff}
.tag-green{background:#f6ffed;color:#52c41a}
.tag-red{background:#fff2f0;color:#ff4d4f}
.tag-orange{background:#fff7e6;color:#fa8c16}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:8px;width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:bold}
.modal-close{cursor:pointer;font-size:20px;color:#999;background:none;border:none}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px;display:flex;align-items:flex-start}
.form-group label{width:130px;text-align:right;padding:6px 12px 0 0;font-size:13px;color:#555;flex-shrink:0}
.form-group .form-ctl{flex:1}
.form-group input,.form-group select,.form-group textarea{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:100%}
.form-group textarea{resize:vertical;min-height:60px}
.tag-select{display:flex;flex-wrap:wrap;gap:6px;padding:6px;border:1px solid #d9d9d9;border-radius:4px;min-height:36px;align-items:center;cursor:pointer;position:relative}
.tag-select .ts-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:3px;font-size:12px}
.tag-select .ts-tag .ts-close{cursor:pointer;color:#999;font-size:14px;line-height:1}
.tag-select .ts-tag .ts-close:hover{color:#ff4d4f}
.tag-select .ts-placeholder{color:#bbb;font-size:13px}
.ms-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f5;transition:background .15s}
.ms-opt:hover{background:#e6f7ff}
.ms-opt input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ms-list{border:1px solid #f0f0f0;border-radius:4px;overflow-y:auto;max-height:260px}
.review-items-table{width:100%;border-collapse:collapse;margin-top:8px}
.review-items-table td{padding:6px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
.review-items-table td:first-child{width:200px;color:#555}
.placeholder-card{background:#fff;border-radius:8px;padding:60px 20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.placeholder-card .ph-icon{font-size:48px;margin-bottom:16px}
.placeholder-card .ph-text{color:#999;font-size:15px}
</style>

// ============================================================
// 导航
// ============================================================
var curPage = 'todo';

// 当前登录用户（原型硬编码）
var LOGIN_USER = '张工';

// 计算待办数量
function pendingCount() {
  var count = 0;
  // 合同评审：status=pending 且 当前用户是评审人且未填写
  REVIEWS.forEach(function(r) {
    if (r.status === 'pending') {
      r.reviewers.forEach(function(rv) {
        if (rv.name === LOGIN_USER && !rv.result) count++;
      });
    }
  });
  return count;
}

function renderNav() {

    ]},

var TITLES = {
  todo: '待办工单',

function navTo(id) {

  renderNav();
  renderPage();
}

// ============================================================
// 工具函数

function statusTag(s) {
  var m = { '通过': 'green', '评审中': 'orange', '不通过': 'red', '待处理': 'orange', '已处理': 'green' };
  return '<span class="tag tag-' + (m[s] || 'blue') + '">' + s + '</span>';
}

function showModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function makeForm(fields) {
  return fields.map(function(f) {
    var star = f.r ? '<span style="color:red">*</span>' : '';
    return '<div class="form-group"><label>' + (f.l || '') + star + '</label><div class="form-ctl">' + f.h + '</div></div>';
  }).join('');
}

function makeSelect(name, opts, val) {
  var h = '<select id="' + name + '">';
  opts.forEach(function(o) {
    h += '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>';
  });
  return h + '</select>';
}

// ============================================================
// 弹框多选组件（支持搜索）
// ============================================================
function multiSelectHtml(id, selected, options, placeholder) {
  var tags = '';
  selected.forEach(function(v) {
    var label = options[v] || v;
    tags += '<span class="ts-tag">' + label + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">' + (placeholder || '点击选择') + '</span>';
  return '<div class="tag-select" id="ts-' + id + '" onclick="multiSelectOpen(\'' + id + '\')">' + tags + '</div>';
}

function multiSelectOpen(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var optKeys = Object.keys(options);

  var rows = optKeys.map(function(k) {
    var checked = selected.indexOf(k) >= 0 ? ' checked' : '';
    return '<label class="ms-opt" data-v="' + k + '"><input type="checkbox"' + checked + '>' + options[k] + '</label>';
  }).join('');

  var body = '<input type="text" id="ms-search-' + id + '" placeholder="&#128269; 输入关键词搜索..." style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;margin-bottom:12px" oninput="multiSelectSearch(\'' + id + '\')">' +
    '<div class="ms-list" id="ms-list-' + id + '">' + rows + '</div>' +
    '<div style="margin-top:8px;color:#999;font-size:12px">已选 <b id="ms-count-' + id + '">' + selected.length + '</b> / ' + optKeys.length + ' 项</div>';

  var footer = '<button class="btn btn-default" onclick="closeModal()">取消</button>' +
    '<button class="btn btn-primary" onclick="multiSelectConfirm(\'' + id + '\')">确定</button>';

  showModal('选择', body, footer);
}

function multiSelectSearch(id) {
  var q = (document.getElementById('ms-search-' + id).value || '').toLowerCase();
  var items = document.getElementById('ms-list-' + id).querySelectorAll('.ms-opt');
  items.forEach(function(item) {
    item.style.display = item.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
}

function multiSelectConfirm(id) {
  var boxes = document.getElementById('ms-list-' + id).querySelectorAll('input[type="checkbox"]');
  var selected = [];
  boxes.forEach(function(cb) {
    if (cb.checked) selected.push(cb.closest('.ms-opt').getAttribute('data-v'));
  });

  var hidden = document.getElementById(id);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
  closeModal();
}

function multiSelectRefresh(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var tags = '';
  selected.forEach(function(v) {
    tags += '<span class="ts-tag">' + (options[v] || v) + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">点击选择</span>';
  document.getElementById('ts-' + id).innerHTML = tags;
}

function multiSelectRemove(id, val) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var idx = selected.indexOf(val);
  if (idx >= 0) selected.splice(idx, 1);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
}

// ============================================================
// 页面渲染

function renderPage() {
  var c = document.getElementById('content');
  switch (curPage) {
    case 'review': c.innerHTML = pageReview(); break;
    case 'todo': c.innerHTML = pageTodo(); break;
    default: c.innerHTML = pagePlaceholder(TITLES[curPage] || curPage); break;
  }
}

function pagePlaceholder(title) {
  return '<div class="placeholder-card"><div class="ph-icon">&#128736;</div><div class="ph-text">' + title + ' 模块 — 待开发</div><div style="color:#bbb;font-size:12px;margin-top:8px">将在后续迭代中逐一实现</div></div>';
}

      r.reviewers.forEach(function(rv) {
        if (rv.name === LOGIN_USER && !rv.result) {
          todos.push({ type: '合同评审', refId: r.id, project: r.proj, client: r.client, date: r.date, reviewer: rv.name, target: 'review' });
        }
      });
    }
  });

  // 按类型分组
  var groups = {};
  todos.forEach(function(t) {
    if (!groups[t.type]) groups[t.type] = [];
    groups[t.type].push(t);
  });

  var groupKeys = Object.keys(groups);
  if (groupKeys.length === 0) {
    return '<div class="card"><div class="card-title">待办工单</div><div style="text-align:center;padding:40px;color:#999;font-size:15px">&#127881; 暂无待办工单</div></div>';
  }

  var html = '';
  groupKeys.forEach(function(gk) {
    var items = groups[gk];
    var rows = items.map(function(t) {
      return '<tr>' +
        '<td>' + gk + '</td>' +
        '<td>' + t.project + '</td>' +
        '<td>' + t.client + '</td>' +
        '<td>' + t.date + '</td>' +
        '<td>' + t.refId + '</td>' +
        '<td><button class="btn btn-primary btn-sm" onclick="navTo(\'' + t.target + '\')">处理</button></td>' +
        '</tr>';
    }).join('');

    html += '<div class="card" style="margin-bottom:12px">' +
      '<div class="card-title" style="display:flex;justify-content:space-between;align-items:center">' +
        '<span>' + gk + '</span>' +
        '<span class="tag tag-orange">' + items.length + ' 条待处理</span>' +
      '</div>' +
      '<table><thead><tr>' +
        '<th>工单类型</th><th>项目名称</th><th>客户名称</th><th>分配日期</th><th>编号</th><th>操作</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
      '</div>';
  });

  return '<div class="card"><div class="card-title">待办工单</div>' +
    '<div style="color:#666;font-size:13px;margin-bottom:8px">当前登录：<b>' + LOGIN_USER + '</b>（质量负责人）</div>' +
    '</div>' + html;
}

function submitNewReview() {
  var rid = (document.getElementById('rf_id').value || '').trim();
  var p = (document.getElementById('rf_proj').value || '').trim();
  var cl = (document.getElementById('rf_client').value || '').trim();
  var ct = (document.getElementById('rf_contact').value || '').trim();
  var ph = (document.getElementById('rf_phone').value || '').trim();
  var content = (document.getElementById('rf_content').value || '').trim();
  var standard = (document.getElementById('rf_standard').value || '').trim();
  var ctype = document.getElementById('rf_ctype').value;
  var domains = JSON.parse(document.getElementById('rf_domains').getAttribute('data-sel') || '[]');
  var reviewersRaw = JSON.parse(document.getElementById('rf_reviewers').getAttribute('data-sel') || '[]');

  if (!rid) { alert('请输入评审编号'); return; }
  if (!p || !cl || !ct || !ph || !content || !standard) { alert('请填写所有必填字段'); return; }
  if (domains.length === 0) { alert('请选择至少一个检测领域'); return; }
  if (reviewersRaw.length === 0) { alert('请选择评审人员'); return; }

  // 编号重复校验
  var dup = REVIEWS.filter(function(r) { return r.id === rid; });
  if (dup.length > 0) { alert('评审编号已存在：' + rid + '，请修改'); return; }

  var hasZL = reviewersRaw.some(function(r) { return r.indexOf('质量负责人') >= 0; });
  var hasBM = reviewersRaw.some(function(r) { return r.indexOf('部门负责人') >= 0; });
  if (!hasZL || !hasBM) { alert('评审人员必须包含质量负责人和部门负责人'); return; }

  var reviewers = reviewersRaw.map(function(r) {
    var m = r.match(/^(.+?) \((.+?)\)$/);
    return { name: m[1], role: m[2], result: '', items: {}, comment: '' };
  });

  REVIEWS.push({
    id: rid, proj: p, client: cl, contact: ct, phone: ph, ctype: ctype,
    testContent: content, standardBasis: standard,
    contractAmount: parseFloat(document.getElementById('rf_amount').value) || 0,
    deliveryDate: document.getElementById('rf_deliveryDate').value,
    deliveryMethod: document.getElementById('rf_deliveryMethod').value,
    useLogo: document.getElementById('rf_useLogo').value,
    otherRequirements: document.getElementById('rf_other').value,
    domains: domains, reviewers: reviewers,
    conclusion: '评审中', date: fmt(NOW), initiator: '张工', status: 'pending'
  });

  closeModal();
  navTo('review');
  alert('评审已发起！编号：' + rid);
}

var ITEM_LABELS = {
  staff: '人员配备是否满足',
  device: '设备配备是否满足',
  env: '环境条件是否满足',
  delivery: '是否可在项目周期内交付',
  sample: '样品管理条件是否满足',
  outsource: '是否分包',
  risk: '是否有风险',
  scope: '检测标准依据是否在能力范围内'
};
var ITEM_KEYS = ['staff', 'device', 'env', 'delivery', 'sample', 'outsource', 'risk', 'scope'];

function reviewDetailHtml(r) {
  // 复用 viewReview 的基本信息展示样式
  return makeForm([
    { l: '评审编号', h: '<input value="' + r.id + '" readonly>' },

    { l: '合同类型', h: '<input value="' + r.ctype + '" readonly>' },
    { l: '拟检测领域', h: '<input value="' + r.domains.join(',') + '" readonly>' },
    { l: '检测内容', h: '<textarea readonly rows="2">' + r.testContent + '</textarea>' },
    { l: '检测标准依据', h: '<input value="' + r.standardBasis + '" readonly>' },
    { l: '合同金额', h: '<input value="¥' + (r.contractAmount || 0).toLocaleString() + '" readonly>' },
    { l: '交付期', h: '<input value="' + (r.deliveryDate || '-') + '" readonly>' },
    { l: '交付方式', h: '<input value="' + (r.deliveryMethod || '-') + '" readonly>' },
    { l: '是否使用标识', h: '<input value="' + (r.useLogo || '否') + '" readonly>' },
    { l: '其他要求', h: '<textarea readonly rows="2">' + (r.otherRequirements || '') + '</textarea>' },
    { l: '评审结论', h: '<input value="' + r.conclusion + '" readonly>' },
    { l: '评审日期', h: '<input value="' + r.date + '" readonly>' },
    { l: '发起人', h: '<input value="' + r.initiator + '" readonly>' }
  ]);
}

function viewReviewWorksheet(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;

  var detailHtml = reviewDetailHtml(r);
  var divider = '<div style="border-top:2px solid #1890ff;margin:16px 0;padding-top:12px;font-weight:bold;color:#1890ff;font-size:14px">▼ 评审明细</div>';

  if (r.status === 'done') {
    // 已完成：基本信息 + 各评审人结果
    var tables = r.reviewers.map(function(rv) {
      var rows = ITEM_KEYS.map(function(k) {
        return '<tr><td>' + ITEM_LABELS[k] + '</td><td>' + (rv.items[k] || '-') + '</td></tr>';
      }).join('');
      return '<div style="margin-bottom:16px;border:1px solid #f0f0f0;border-radius:6px;overflow:hidden">' +
        '<div style="padding:8px 12px;background:#fafafa;font-weight:bold">' + rv.name + '（' + rv.role + '）— 结论：' + statusTag(rv.result || '未填写') +
        (rv.comment ? ' <span style="color:#999;font-weight:normal;font-size:12px">备注：' + rv.comment + '</span>' : '') + '</div>' +
        '<table class="review-items-table">' + rows + '</table></div>';
    }).join('');
    showModal('评审工单 - ' + r.id, '<div style="max-height:55vh;overflow-y:auto">' + detailHtml + divider + tables + '</div>');
  } else {
    // 评审中：基本信息 + 评审人填写状态
    var rows = r.reviewers.map(function(rv, i) {
      var filled = rv.result ? true : false;
      return '<tr><td>' + rv.name + '</td><td>' + rv.role + '</td>' +
        '<td>' + (filled ? statusTag(rv.result) : '<span style="color:#999">未填写</span>') + '</td>' +
        '<td><button class="btn btn-primary btn-sm" onclick="fillReviewWorksheet(\'' + id + '\',' + i + ')">' + (filled ? '修改' : '填写') + '</button></td></tr>';
    }).join('');

    var html = detailHtml + divider +
      '<table><thead><tr><th>评审人</th><th>角色</th><th>结论</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:16px;text-align:center">' +
        '<button class="btn btn-warning" onclick="finalizeReview(\'' + id + '\')">汇总评审结论</button>' +
      '</div>';

    showModal('评审工单 - ' + r.id, '<div style="max-height:55vh;overflow-y:auto">' + html + '</div>');
  }
}

function fillReviewWorksheet(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];

  var detailHtml = reviewDetailHtml(r);
  var divider = '<div style="border-top:2px solid #1890ff;margin:16px 0;padding-top:12px;font-weight:bold;color:#1890ff;font-size:14px">▼ 填写评审意见 — ' + rv.name + '（' + rv.role + '）</div>';

  var itemFields = ITEM_KEYS.map(function(k) {
    return { l: ITEM_LABELS[k], r: 1, h: makeSelect('rwi_' + k, ['是', '否'], rv.items[k] || '') };
  });

  var body = '<div style="max-height:55vh;overflow-y:auto">' + detailHtml + divider +
    makeForm(itemFields.concat([
      { l: '评审结论', r: 1, h: makeSelect('rwi_conclusion', ['通过', '不通过'], rv.result || '') },
      { l: '不通过原因', h: '<textarea id="rwi_comment" rows="2" placeholder="不通过时请填写原因">' + (rv.comment || '') + '</textarea>' }
    ])) + '</div>';

  var footer = '<button class="btn btn-primary" onclick="submitReviewItem(\'' + id + '\',' + idx + ')">保存</button>';
  showModal('填写评审工单 — ' + rv.name, body, footer);
}

function submitReviewItem(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];
  var conclusion = document.getElementById('rwi_conclusion').value;
  var comment = (document.getElementById('rwi_comment').value || '').trim();

  if (conclusion === '不通过' && !comment) {
    alert('不通过时必须填写不通过原因');
    return;
  }

  rv.result = conclusion;
  rv.comment = comment;
  ITEM_KEYS.forEach(function(k) {
    rv.items[k] = document.getElementById('rwi_' + k).value;
  });

  closeModal();
  viewReviewWorksheet(id);
  renderNav();
  alert(rv.name + ' 评审工单已保存');
}

function finalizeReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  // Check all reviewers have filled
  var unfilled = r.reviewers.filter(function(rv) { return !rv.result; });
  if (unfilled.length > 0) {
    var names = unfilled.map(function(rv) { return rv.name; }).join('、');
    alert('以下评审人尚未填写：' + names);
    return;
  }

  var allPass = r.reviewers.every(function(rv) { return rv.result === '通过'; });
  if (allPass) {
    r.conclusion = '通过';
    r.status = 'done';
    closeModal();
    navTo('review');
    alert('全员通过！评审已通过，可进入合同签订阶段。');
  } else {
    r.conclusion = '不通过';
    r.status = 'done';
    var failNames = r.reviewers.filter(function(rv) { return rv.result === '不通过'; }).map(function(rv) { return rv.name; }).join('、');
    closeModal();
    navTo('review');
    alert('评审不通过！不通过人员：' + failNames + '。流程终止。');
  }
}
