// ============================================================
// 任务列表页面 (2.1)
// ============================================================
function pageTask() {
  var filterId = '', filterClient = '', filterDomain = '', filterStage = '', filterInspector = '';
  
  function getBaseData() {
    if (taskTab === 'active') return TASKS.filter(function(t) { return t.status === '进行中'; });
    return TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档' || t.status === '已终止'; });
  }

  function doFilter() {
    filterId = (document.getElementById('task_filter_id')||{}).value || '';
    filterClient = (document.getElementById('task_filter_client')||{}).value || '';
    filterDomain = (document.getElementById('task_filter_domain')||{}).value || '';
    filterStage = (document.getElementById('task_filter_stage')||{}).value || '';
    filterInspector = (document.getElementById('task_filter_inspector')||{}).value || '';
    var base = getBaseData();
    var f = base.filter(function(t) {
      if (filterId && t.id.indexOf(filterId) === -1) return false;
      if (filterClient && t.client.indexOf(filterClient) === -1) return false;
      if (filterDomain && t.domain !== filterDomain) return false;
      if (filterStage && t.currentStage !== filterStage) return false;
      if (filterInspector && (t.inspector||'待分配').indexOf(filterInspector) === -1) return false;
      return true;
    });
    taskFiltered = f;
    refreshTaskTable();
  }

  function rowHtml(t) {
    var domainLabel = DOMAIN_LABELS[t.domain] || t.domain;
    var inspectorDisplay = (t.leaders && t.leaders.length > 0) ? t.leaders[0] : (t.inspector || '<span style="color:#999">待分配</span>');
    if (t.leaders && t.leaders.length > 1) inspectorDisplay += ' +' + (t.leaders.length-1);
    var deadlineDisplay = t.deadline || t.planEnd || '-';
    var ops = '';
    // 阶段操作按钮（仅管理层可操作）
    if (t.status === '进行中' && isManager()) {
      if (t.currentStage === '样品接收') {
        ops += '<button class="btn btn-success btn-sm" onclick="stageReceiveSample(\'' + t.id + '\')">样品接收</button> ';
      } else if (t.currentStage === '待样品管理员确认') {
        ops += '<button class="btn btn-warning btn-sm" onclick="stageReceiveSample(\'' + t.id + '\')">待管理员确认</button> ';
      } else if (t.currentStage === '任务派工') {
        if (canAssignTask()) {
          ops += '<button class="btn btn-primary btn-sm" onclick="openTaskAssignModal(\'' + t.id + '\')">派工</button> ';
        } else {
          ops += '<span style="color:#999;font-size:12px" title="仅技术负责人/实验室负责人可派工">🔒 无派工权限</span> ';
        }
      } else if (t.currentStage === '测试方案') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openTestPlanModal(\'' + t.id + '\')">编制方案</button> ';
      } else if (t.currentStage === '方案评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openSchemeReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '用户确认方案') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openUserConfirmModal(\'' + t.id + '\')">上传确认文件</button> ';
      } else if (t.currentStage === '测试配置及环境确认') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openConfigConfirmModal(\'' + t.id + '\')">上传配置表</button> ';
      } else if (t.currentStage === '测试记录') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openTestRecordModal(\'' + t.id + '\')">上传测试记录</button> ';
      } else if (t.currentStage === '测试记录评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openTestRecordReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '回归测试记录') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openRegressionModal(\'' + t.id + '\')">上传回归记录</button> ';
      } else if (t.currentStage === '回归测试问题报告评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openRegressionReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '检测报告') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openReportModal(\'' + t.id + '\')">编制报告</button> ';
      } else if (t.currentStage === '检测报告评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openReportReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '用印审批') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openSealApprovalModal(\'' + t.id + '\')">提交审批</button> ';
      } else if (t.currentStage === '出具报告') {
        ops += '<button class="btn btn-success btn-sm" onclick="openIssueReportModal(\'' + t.id + '\')">出具报告</button> ';
      } else if (t.currentStage === '归档') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openArchiveModal(\'' + t.id + '\')">归档</button> ';
      } else if (t.currentStage === '客户满意度调查') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openSurveyModal(\'' + t.id + '\')">发送调查</button> ';
      }
    }
    ops += '<button class="btn btn-default btn-sm" onclick="viewTaskDetail(\'' + t.id + '\')">查看详情</button>';
    if (t.delegateId) {
      ops += ' <button class="btn btn-default btn-sm" onclick="viewCommissionDetail(\'' + t.delegateId + '\')">查看委托</button>';
    }
    // 管理层专属操作
    if (isManager()) {
      if (t.status === '进行中') {
        ops += ' <button class="btn btn-danger btn-sm" onclick="terminateTask(\'' + t.id + '\')">终止</button>';
      }
      ops += ' <button class="btn btn-default btn-sm" onclick="editTask(\'' + t.id + '\')">编辑</button>';
      if (t.currentStage === '未开始') {
        ops += ' <button class="btn btn-danger btn-sm" onclick="deleteTask(\'' + t.id + '\')">删除</button>';
      }
    }
    return '<tr><td>' + t.id + '</td><td>' + (t.delegateId||'-') + '</td><td>' + t.client + '</td>' +
      '<td>' + domainLabel + '</td><td>' + t.obj + '</td><td>' + t.currentStage + '</td>' +
      '<td>' + inspectorDisplay + '</td><td>' + statusTag(t.status) + '</td>' +
      '<td>' + deadlineDisplay + '</td><td style="white-space:nowrap">' + ops + '</td></tr>';
  }

  function refreshTaskTable() {
    var rows = taskFiltered.map(rowHtml).join('');
    var tbody = document.getElementById('task_tbody');
    if (tbody) tbody.innerHTML = rows || '<tr><td colspan="10" style="text-align:center;color:#999;padding:30px">无匹配任务</td></tr>';
    var el = document.getElementById('task_count');
    if (el) el.innerHTML = '共 <b>' + taskFiltered.length + '</b> 条';
  }

  var domainOpts = DOMAINS.map(function(d) { return '<option value="' + d + '">' + DOMAIN_LABELS[d] + '</option>'; }).join('');
  var stageOpts = STAGES.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');

  var activeCount = TASKS.filter(function(t) { return t.status === '进行中'; }).length;
  var doneCount = TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档' || t.status === '已终止'; }).length;

  taskTab = 'active';
  taskFiltered = getBaseData();
  var initialRows = taskFiltered.map(rowHtml).join('');

  setTimeout(function() {
    document.getElementById('task_filter_id').oninput = doFilter;
    document.getElementById('task_filter_client').oninput = doFilter;
    document.getElementById('task_filter_domain').onchange = doFilter;
    document.getElementById('task_filter_stage').onchange = doFilter;
    document.getElementById('task_filter_inspector').oninput = doFilter;
  }, 10);

  return '<div class="card"><div class="card-title">检测任务列表</div>' +
    '<div style="margin-bottom:4px">' +
      '<button id="task_tab_active" class="btn btn-primary btn-sm" onclick="switchTaskTab(\'active\')">🔄 进行中 (' + activeCount + ')</button> ' +
      '<button id="task_tab_done" class="btn btn-default btn-sm" onclick="switchTaskTab(\'done\')">✅ 已完成 (' + doneCount + ')</button>' +
    '</div>' +
    '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px">' +
      '<input id="task_filter_id" placeholder="任务编号" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:200px">' +
      '<input id="task_filter_client" placeholder="委托方" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:150px">' +
      '<select id="task_filter_domain" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">检测领域-全部</option>' + domainOpts + '</select>' +
      '<select id="task_filter_stage" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">当前阶段-全部</option>' + stageOpts + '</select>' +
      '<input id="task_filter_inspector" placeholder="主检人" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:120px">' +
      (isManager() ? '<button class="btn btn-primary" onclick="openNewTaskModal()">+ 新建任务</button>' : '') +
      '<span id="task_count" style="margin-left:auto;color:#666;font-size:13px">共 <b>' + taskFiltered.length + '</b> 条</span>' +
    '</div>' +
    '<table><thead><tr>' +
    '<th>任务编号</th><th>关联委托</th><th>委托方</th><th>检测领域</th><th>检测对象</th><th>当前阶段</th><th>负责人</th><th>任务状态</th><th>完成期限</th><th>操作</th>' +
    '</tr></thead><tbody id="task_tbody">' + initialRows + '</tbody></table></div>';
}

var taskTab = 'active', taskFiltered = [];
function switchTaskTab(tab) {
  taskTab = tab;
  document.getElementById('task_tab_active').className = tab === 'active' ? 'btn btn-primary btn-sm' : 'btn btn-default btn-sm';
  document.getElementById('task_tab_done').className = tab === 'done' ? 'btn btn-primary btn-sm' : 'btn btn-default btn-sm';
  // 清空筛选条件
  var els = ['task_filter_id','task_filter_client','task_filter_domain','task_filter_stage','task_filter_inspector'];
  els.forEach(function(id) { var e = document.getElementById(id); if (e) e.value = ''; });
  // 重新过滤
  var base = tab === 'active' ? TASKS.filter(function(t) { return t.status === '进行中'; }) : TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档' || t.status === '已终止'; });
  taskFiltered = base;
  var rows = taskFiltered.map(function(t) {
    var domainLabel = DOMAIN_LABELS[t.domain] || t.domain;
    var inspectorDisplay = (t.leaders && t.leaders.length > 0) ? t.leaders[0] : (t.inspector || '<span style="color:#999">待分配</span>');
    if (t.leaders && t.leaders.length > 1) inspectorDisplay += ' +' + (t.leaders.length-1);
    var deadlineDisplay = t.deadline || t.planEnd || '-';
    var ops = '';
    // 阶段操作按钮（仅管理层可操作）
    if (t.status === '进行中' && isManager()) {
      if (t.currentStage === '样品接收') {
        ops += '<button class="btn btn-success btn-sm" onclick="stageReceiveSample(\'' + t.id + '\')">样品接收</button> ';
      } else if (t.currentStage === '待样品管理员确认') {
        ops += '<button class="btn btn-warning btn-sm" onclick="stageReceiveSample(\'' + t.id + '\')">待管理员确认</button> ';
      } else if (t.currentStage === '任务派工') {
        if (canAssignTask()) {
          ops += '<button class="btn btn-primary btn-sm" onclick="openTaskAssignModal(\'' + t.id + '\')">派工</button> ';
        } else {
          ops += '<span style="color:#999;font-size:12px" title="仅技术负责人/实验室负责人可派工">🔒 无派工权限</span> ';
        }
      } else if (t.currentStage === '测试方案') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openTestPlanModal(\'' + t.id + '\')">编制方案</button> ';
      } else if (t.currentStage === '方案评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openSchemeReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '用户确认方案') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openUserConfirmModal(\'' + t.id + '\')">上传确认文件</button> ';
      } else if (t.currentStage === '测试配置及环境确认') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openConfigConfirmModal(\'' + t.id + '\')">上传配置表</button> ';
      } else if (t.currentStage === '测试记录') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openTestRecordModal(\'' + t.id + '\')">上传测试记录</button> ';
      } else if (t.currentStage === '测试记录评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openTestRecordReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '回归测试记录') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openRegressionModal(\'' + t.id + '\')">上传回归记录</button> ';
      } else if (t.currentStage === '回归测试问题报告评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openRegressionReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '检测报告') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openReportModal(\'' + t.id + '\')">编制报告</button> ';
      } else if (t.currentStage === '检测报告评审') {
        ops += '<button class="btn btn-warning btn-sm" onclick="openReportReviewModal(\'' + t.id + '\')">发起评审</button> ';
      } else if (t.currentStage === '用印审批') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openSealApprovalModal(\'' + t.id + '\')">提交审批</button> ';
      } else if (t.currentStage === '出具报告') {
        ops += '<button class="btn btn-success btn-sm" onclick="openIssueReportModal(\'' + t.id + '\')">出具报告</button> ';
      } else if (t.currentStage === '归档') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openArchiveModal(\'' + t.id + '\')">归档</button> ';
      } else if (t.currentStage === '客户满意度调查') {
        ops += '<button class="btn btn-primary btn-sm" onclick="openSurveyModal(\'' + t.id + '\')">发送调查</button> ';
      }
    }
    ops += '<button class="btn btn-default btn-sm" onclick="viewTaskDetail(\'' + t.id + '\')">查看详情</button>';
    if (t.delegateId) ops += ' <button class="btn btn-default btn-sm" onclick="viewCommissionDetail(\'' + t.delegateId + '\')">查看委托</button>';
    // 管理层专属操作
    if (isManager()) {
      if (t.status === '进行中') {
        ops += ' <button class="btn btn-danger btn-sm" onclick="terminateTask(\'' + t.id + '\')">终止</button>';
      }
      ops += ' <button class="btn btn-default btn-sm" onclick="editTask(\'' + t.id + '\')">编辑</button>';
      if (t.currentStage === '未开始') {
        ops += ' <button class="btn btn-danger btn-sm" onclick="deleteTask(\'' + t.id + '\')">删除</button>';
      }
    }
    return '<tr><td>' + t.id + '</td><td>' + (t.delegateId||'-') + '</td><td>' + t.client + '</td>' +
      '<td>' + domainLabel + '</td><td>' + t.obj + '</td><td>' + t.currentStage + '</td>' +
      '<td>' + inspectorDisplay + '</td><td>' + statusTag(t.status) + '</td>' +
      '<td>' + deadlineDisplay + '</td><td style="white-space:nowrap">' + ops + '</td></tr>';
  }).join('');
  var tbody = document.getElementById('task_tbody');
  if (tbody) tbody.innerHTML = rows || '<tr><td colspan="10" style="text-align:center;color:#999;padding:30px">无匹配任务</td></tr>';
  var el = document.getElementById('task_count');
  if (el) el.innerHTML = '共 <b>' + taskFiltered.length + '</b> 条';
}

function viewTaskDetail(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  var phaseOrder = ['A','B','C','D','E','F'];
  var phaseLabels = { A: '前期准备', B: '方案阶段', C: '实施阶段', D: '问题处理', E: '报告阶段', F: '结项' };
  var curPhase = STAGE_PHASE[t.currentStage] || 'A';
  var curPhaseIdx = phaseOrder.indexOf(curPhase);

  // 历史查找表
  var histMap = {};
  t.stageHistory.forEach(function(h) { histMap[h.stage] = h; });

  // 按阶段分组
  var phaseStages = {};
  STAGES.forEach(function(s) {
    var p = STAGE_PHASE[s];
    if (!phaseStages[p]) phaseStages[p] = [];
    phaseStages[p].push(s);
  });

  var fHtml = '<div class="flowchart" id="flowchart">';
  phaseOrder.forEach(function(p, pi) {
    var stages = phaseStages[p] || [];
    var pDone = pi < curPhaseIdx;
    var pCur = pi === curPhaseIdx;
    fHtml += '<div class="phase-column">';
    fHtml += '<div class="phase-header ' + (pCur ? 'phase-current' : (pDone ? 'phase-done' : 'phase-pending')) + '">' + phaseLabels[p] + '<br><small>[' + p + ']</small></div>';
    stages.forEach(function(s, si) {
      var cls = 'stage-node';
      if (histMap[s]) cls += ' stage-done';
      else if (s === t.currentStage) cls += ' stage-current';
      else cls += ' stage-pending';

      var meta = '';
      if (histMap[s]) {
        meta = '<div class="stage-meta">✓ ' + histMap[s].date + '</div><div class="stage-meta-sm">' + histMap[s].operator + '</div>';
      }

      fHtml += '<div class="' + cls + '" onclick="showStageDetail(\'' + taskId + '\',\'' + s + '\')" data-stage="' + s + '">';
      fHtml += '<div class="stage-dot"></div>';
      fHtml += '<div class="stage-name">' + s + '</div>';
      fHtml += meta;
      fHtml += '</div>';

      if (si < stages.length - 1) {
        fHtml += '<div class="stage-connector"></div>';
      }
    });
    fHtml += '</div>';
    if (pi < phaseOrder.length - 1) {
      fHtml += '<div class="phase-arrow">→</div>';
    }
  });
  fHtml += '</div>';

  var detailHtml = '<div id="stageDetailPanel" class="stage-detail-panel">';
  detailHtml += '<div class="stage-detail-placeholder">👆 点击上方流程图的任意阶段查看详情</div>';
  detailHtml += '</div>';

  // 关联数据查找
  var rev = null;
  if (t.reviewId) rev = REVIEWS.filter(function(r) { return r.id === t.reviewId; })[0];
  var del = null;
  if (t.delegateId) del = DELEGATES.filter(function(d) { return d.id === t.delegateId; })[0];

  // ── 基本信息区：两列表格，左侧标签右侧值 ──
  var infoRows = '';

  // 任务信息
  infoRows += '<tr class="info-section"><td colspan="4">📋 任务信息</td></tr>';
  infoRows += '<tr><td class="sdt-label">任务编号</td><td>' + t.id + '</td><td class="sdt-label">任务状态</td><td>' + statusTag(t.status) + '</td></tr>';
  infoRows += '<tr><td class="sdt-label">检测领域</td><td>' + (DOMAIN_LABELS[t.domain]||t.domain) + '</td><td class="sdt-label">当前阶段</td><td>' + t.currentStage + '</td></tr>';
  infoRows += '<tr><td class="sdt-label">项目名称</td><td>' + t.proj + '</td><td class="sdt-label">检测对象</td><td>' + t.obj + '</td></tr>';
  infoRows += '<tr><td class="sdt-label">委托方</td><td>' + t.client + '</td><td class="sdt-label">创建日期</td><td>' + (t.createDate||'-') + '</td></tr>';
  infoRows += '<tr><td class="sdt-label">项目负责人</td><td>' + (t.leaders ? t.leaders.join('、') : (t.inspector || '<span style="color:#bbb">待分配</span>')) + '</td><td class="sdt-label">测试工程师</td><td>' + (t.engineers ? t.engineers.join('、') : (t.reviewer || '<span style="color:#bbb">待分配</span>')) + '</td></tr>';
  infoRows += '<tr><td class="sdt-label">完成期限</td><td>' + (t.deadline || t.planEnd || '-') + '</td><td class="sdt-label">计划时间</td><td>' + (t.planStart||'-') + ' ~ ' + (t.planEnd||'-') + '</td></tr>';

  // 合同评审信息
  infoRows += '<tr class="info-section"><td colspan="4">📝 合同评审信息 ' + (rev ? '<span style="font-size:11px;font-weight:normal;color:#52c41a">（' + rev.id + '）</span>' : '<span style="font-size:11px;font-weight:normal;color:#faad14">（未关联）</span>') + '</td></tr>';
  if (rev) {
    infoRows += '<tr><td class="sdt-label">合同类型</td><td>' + (rev.ctype||'-') + '</td><td class="sdt-label">评审结论</td><td>' + (rev.conclusion === '通过' ? '<span class="tag tag-green">通过</span>' : (rev.conclusion||'-')) + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">联系人</td><td>' + (rev.contact||'-') + '</td><td class="sdt-label">联系方式</td><td>' + (rev.phone||'-') + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">检测内容</td><td colspan="3">' + (rev.testContent||'-') + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">检测标准依据</td><td>' + (rev.standardBasis||'-') + '</td><td class="sdt-label">合同金额</td><td>' + (rev.contractAmount ? '¥' + rev.contractAmount.toLocaleString() : '-') + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">交付期</td><td>' + (rev.deliveryDate||'-') + '</td><td class="sdt-label">交付方式</td><td>' + (rev.deliveryMethod||'-') + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">是否使用标识</td><td>' + (rev.useLogo||'否') + '</td><td class="sdt-label">其他要求</td><td>' + (rev.otherRequirements||'无') + '</td></tr>';
  } else {
    infoRows += '<tr><td colspan="4" style="color:#bbb;text-align:center;padding:12px">⚠️ 该任务未关联合同评审记录</td></tr>';
  }

  // 委托信息
  infoRows += '<tr class="info-section"><td colspan="4">📨 委托信息 ' + (del ? '<span style="font-size:11px;font-weight:normal;color:#52c41a">（' + del.id + '）</span>' : '<span style="font-size:11px;font-weight:normal;color:#bbb">（未关联）</span>') + '</td></tr>';
  if (del) {
    infoRows += '<tr><td class="sdt-label">委托状态</td><td>' + (del.status === '已通过' ? '<span class="tag tag-green">已通过</span>' : '<span class="tag tag-blue">' + (del.status||'-') + '</span>') + '</td><td class="sdt-label">委托方地址</td><td>' + (del.address||'-') + '</td></tr>';
    infoRows += '<tr><td class="sdt-label">对象名称版本</td><td colspan="3">' + (del.objNameVer||'-') + '</td></tr>';
    if (del.specialReq) infoRows += '<tr><td class="sdt-label">特殊要求</td><td colspan="3">' + del.specialReq + '</td></tr>';
  } else {
    infoRows += '<tr><td colspan="4" style="color:#bbb;text-align:center;padding:12px">该任务未关联委托记录</td></tr>';
  }

  var body = '<div style="margin-bottom:12px"><b>任务详情</b></div>' +
    '<table class="stage-detail-table">' + infoRows + '</table>' +
    '<div style="margin:16px 0"><b>全流程总览</b> <span style="font-size:11px;color:#999;font-weight:normal">（点击阶段查看详情）</span></div>' +
    fHtml + detailHtml;

  showModal('任务详情 — ' + t.id, body, '<button class="btn btn-default" onclick="closeModal()">关闭</button>');
  var modal = document.getElementById('modalOverlay');
  var modalEl = modal.querySelector('.modal');
  modalEl.classList.add('modal-wide');
}

// ── 任务管理操作（管理层）──
function terminateTask(taskId) {
  if (!isManager()) { alert('仅管理层可终止任务'); return; }
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  if (t.status === '已归档' || t.status === '已终止') { alert('已归档或已终止的任务不可再终止'); return; }
  if (!confirm('确认终止任务「' + t.proj + '」？\n编号：' + t.id + '\n此操作不可逆！')) return;
  t.status = '已终止';
  t.stageHistory.push({ stage: '已终止', date: fmt(new Date()), operator: LOGIN_USER });
  alert('任务已终止');
  renderPage();
}
function editTask(taskId) {
  if (!isManager()) { alert('仅管理层可编辑任务'); return; }
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  var body = '<div class="form-group"><label>任务编号</label><div class="form-ctl"><input id="edit_id" value="' + t.id + '"></div></div>' +
    '<div class="form-group"><label>委托方</label><div class="form-ctl"><input id="edit_client" value="' + (t.client||'') + '"></div></div>' +
    '<div class="form-group"><label>检测对象</label><div class="form-ctl"><input id="edit_obj" value="' + (t.obj||'') + '"></div></div>' +
    '<div class="form-group"><label>项目名称</label><div class="form-ctl"><input id="edit_proj" value="' + (t.proj||'') + '"></div></div>' +
    '<div class="form-group"><label>完成期限</label><div class="form-ctl"><input type="date" id="edit_planend" value="' + (t.planEnd||'') + '"></div></div>';
  showModal('编辑任务 — ' + t.id, body,
    '<button class="btn btn-primary" onclick="confirmEditTask(\'' + taskId + '\')">保存修改</button>' +
    '<button class="btn btn-default" onclick="closeModal()">取消</button>');
}
function confirmEditTask(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  t.id = document.getElementById('edit_id').value;
  t.client = document.getElementById('edit_client').value;
  t.obj = document.getElementById('edit_obj').value;
  t.proj = document.getElementById('edit_proj').value;
  t.planEnd = document.getElementById('edit_planend').value;
  alert('任务信息已更新');
  closeModal();
  renderPage();
}
function deleteTask(taskId) {
  if (!isManager()) { alert('仅管理层可删除任务'); return; }
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  if (t.currentStage !== '未开始') { alert('仅可删除未派工的任务'); return; }
  if (!confirm('确认删除任务「' + t.proj + '」？\n编号：' + t.id + '\n此操作不可逆！')) return;
  TASKS = TASKS.filter(function(x) { return x.id !== taskId; });
  alert('任务已删除');
  renderPage();
}

function openNewTaskModal() {
  if (!isManager()) { alert('仅管理层可新建任务'); return; }
  // 从已通过的委托中选择（任务是委托的下游，必须先有已通过的委托）
  var approvedDelegates = DELEGATES.filter(function(d) { return d.status === '已通过'; });
  var opts = approvedDelegates.map(function(d) {
    return '<option value="' + d.id + '">' + d.objNameVer + ' (' + d.client + ')</option>';
  }).join('');
  
  var body = '<div class="form-group"><label>关联委托</label><div class="form-ctl"><select id="newtask_delegate" style="width:100%"><option value="">-- 请选择 --</option>' + opts + '</select></div></div>' +
    '<div class="form-group"><label>任务编号</label><div class="form-ctl"><input id="newtask_id" placeholder="自动生成，支持手动修改"></div></div>' +
    '<div class="form-group"><label>委托方</label><div class="form-ctl"><input id="newtask_client" readonly style="background:#f5f5f5"></div></div>' +
    '<div class="form-group"><label>检测对象</label><div class="form-ctl"><input id="newtask_obj" readonly style="background:#f5f5f5"></div></div>' +
    '<div class="form-group"><label>检测领域</label><div class="form-ctl"><input id="newtask_domain" readonly style="background:#f5f5f5"></div></div>' +
    '<div class="form-group"><label>计划完成日期</label><div class="form-ctl"><input type="date" id="newtask_planend"></div></div>';

  showModal('新建检测任务', body,

function stageReceiveSample(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];

  var samples = SAMPLES.filter(function(s) { return s.taskId === taskId; });

  } else {
    var html = '<div style="max-width:780px;margin:0 auto">';
    html += '<p style="margin-bottom:8px;color:#666;font-size:13px">任务：' + taskId + '｜' + t.proj + '｜样品数：' + samples.length + ' 个</p>';
    html += renderSampleTableRO(taskId);
    html += '<div style="text-align:right;margin-top:16px">';
    html += '<button class="btn btn-default" onclick="closeModal()">关闭</button> ';
    if (isAdminCheck) {
      if (LOGIN_ROLE !== '样品管理员') {
        html += '<span style="color:#fa8c16;font-size:12px;margin-right:8px">🔒 仅样品管理员可确认</span>';
      } else {
        html += '<button class="btn btn-success" onclick="closeModal();confirmSampleAdminCheck(\'' + taskId + '\')">✅ 样品管理员确认</button>';
      }

      html += '<button class="btn btn-success" onclick="closeModal();confirmReceiveSample(\'' + taskId + '\')">✅ 确认接收（需样品管理员复核）</button>';

function confirmSampleAdminCheck(taskId) {

function saveSample() {
  var sampleId = document.getElementById('sf_sampleId').value;
  var taskId = document.getElementById('sf_taskId').value;
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];

  var data = {
    id: sampleId || ('SMP-' + new Date().getTime()),
    taskId: taskId,
    proj: t.proj,
    client: t.client,
    sampleNo: document.getElementById('sf_sampleNo').value.trim(),
    name: document.getElementById('sf_name').value.trim(),
    source: document.getElementById('sf_source').value,
    sampleType: (function(){ var t = document.getElementById('sf_type').value; if (t === '其他') { var c = document.getElementById('sf_customType'); return c && c.value.trim() ? c.value.trim() : '其他'; } return t; })(),
    returnMethod: document.getElementById('sf_returnMethod').value,
    spec: document.getElementById('sf_spec').value.trim(),
    qty: parseInt(document.getElementById('sf_qty').value) || 1,
    unit: document.getElementById('sf_unit').value.trim() || '套',
    location: document.getElementById('sf_location').value.trim(),
    checkItems: (function(){
      var getRadio = function(name){ var el=document.querySelector('input[name="'+name+'"]:checked'); return el?el.value:''; };
      return JSON.stringify({
        intact:   {value: getRadio('sf_intact'),    remark: (document.getElementById('sf_intactRemark')||{}).value||''},
        virusFree:{value: getRadio('sf_virusFree'),  remark: (document.getElementById('sf_virusFreeRemark')||{}).value||''},
        md5:      {value: getRadio('sf_md5'),        remark: (document.getElementById('sf_md5Remark')||{}).value||''}
      });
    })(),
    status: '已接收',
    receiveDate: document.getElementById('sf_date').value,
    remark: document.getElementById('sf_remark').value.trim()
  };

  if (!data.sampleNo || !data.name) {
    alert('样品编号和样品名称不能为空');
    return;
  }

  if (sampleId) {
    var idx = -1;
    SAMPLES.forEach(function(x, i) { if (x.id === sampleId) idx = i; });
    if (idx >= 0) SAMPLES[idx] = data;
  } else {
    SAMPLES.push(data);
  }

  closeModal();
  // 如果当前在样品管理页面，刷新列表
  if (curPage === 'sample') {
    pageSampleRefresh();
  } else if (document.getElementById('stageDetailPanel')) {
    showSampleInline(taskId);
  }
}

function confirmReceiveSample(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  var samples = SAMPLES.filter(function(s) { return s.taskId === taskId; });
  if (samples.length === 0) {
    alert('⚠️ 请至少添加一个样品后再确认接收！');
    return;
  }
  if (!confirm('确认样品接收完成，进入「待样品管理员确认」？\n当前样品数：' + samples.length + ' 个\n\n⚠ 需样品管理员复核确认后才能进入任务派工')) return;
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

var PERSON_LIST = ['王工', '李工', '赵工', '孙工', '钱工', '陈工'];

function renderPersonTags(containerId, hiddenId) {
  var container = document.getElementById(containerId);
  var hidden = document.getElementById(hiddenId);
  var vals = hidden.value ? hidden.value.split(',') : [];
  var html = '';
  vals.forEach(function(v, i) {
    html += '<span style="display:inline-flex;align-items:center;background:#e6f7ff;border:1px solid #91d5ff;border-radius:3px;padding:2px 6px;font-size:13px;margin:2px">' +
      v + '<span style="cursor:pointer;margin-left:4px;color:#999;font-size:14px;line-height:1" onclick="removePersonTag(\'' + containerId + '\',\'' + hiddenId + '\',' + i + ')">×</span></span>';
  });
  if (!vals.length) html = '<span style="color:#bbb;font-size:12px">请选择人员</span>';
  container.innerHTML = html;
}

function removePersonTag(containerId, hiddenId, idx) {
  var hidden = document.getElementById(hiddenId);
  var vals = hidden.value ? hidden.value.split(',') : [];
  vals.splice(idx, 1);
  hidden.value = vals.join(',');
  renderPersonTags(containerId, hiddenId);
}

var _modalStack = [];
var _pendingLeaders = [];
var _pendingEngineers = [];

function pushModal(title, body, footer) {
  _modalStack.push({ title: document.getElementById('modalTitle').textContent, body: document.getElementById('modalBody').innerHTML, footer: document.getElementById('modalFooter').innerHTML });
  showModal(title, body, footer);
}

function popModal() {
  if (_modalStack.length === 0) { closeModal(); return; }
  var m = _modalStack.pop();
  showModal(m.title, m.body, m.footer);
}

function openPersonSelector(type, taskId) {
  var hiddenId = type === 'leader' ? 'assign_leaders_val' : 'assign_engineers_val';
  var hidden = document.getElementById(hiddenId);
  // 保存当前值到全局变量，因为 pushModal 会销毁这个 DOM
  var curVals = hidden && hidden.value ? hidden.value.split(',') : [];
  if (type === 'leader') _pendingLeaders = curVals; else _pendingEngineers = curVals;
  
  var selected = type === 'leader' ? _pendingLeaders : _pendingEngineers;
  var title = type === 'leader' ? '选择项目负责人' : '选择测试工程师';

  var cbs = PERSON_LIST.map(function(n) {
    var checked = selected.indexOf(n) >= 0 ? ' checked' : '';
    return '<label style="display:block;padding:6px 0;cursor:pointer;font-weight:normal"><input type="checkbox" name="ps_sel" value="' + n + '"' + checked + '> ' + n + '</label>';
  }).join('');

  var body = '<div style="max-width:400px;margin:0 auto">' +
    '<div style="margin-bottom:8px"><label style="cursor:pointer;color:#1890ff;font-size:13px"><input type="checkbox" onclick="var c=this.checked;var cbs=document.querySelectorAll(\'input[name=ps_sel]\');for(var i=0;i<cbs.length;i++)cbs[i].checked=c;"> 全选 / 取消全选</label></div>' +
    cbs +
    '</div>';

  pushModal(title, body,
    '<button class="btn btn-primary" onclick="confirmPersonSelector(\'' + type + '\')">确定</button>' +
    '<button class="btn btn-default" onclick="popModal()">取消</button>'
  );
}

function confirmPersonSelector(type) {
  var cbs = document.querySelectorAll('input[name="ps_sel"]:checked');
  var vals = [];
  cbs.forEach(function(cb) { vals.push(cb.value); });
  
  // 存到全局变量
  if (type === 'leader') _pendingLeaders = vals; else _pendingEngineers = vals;
  
  // 恢复主弹窗
  popModal();
  
  // 现在主弹窗 DOM 已恢复，更新隐藏 input 和标签
  var hiddenId = type === 'leader' ? 'assign_leaders_val' : 'assign_engineers_val';
  var containerId = type === 'leader' ? 'assign_leader_tags' : 'assign_engineer_tags';
  var hidden = document.getElementById(hiddenId);
  if (hidden) hidden.value = vals.join(',');
  renderPersonTags(containerId, hiddenId);
}

function confirmTaskAssign(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  
  var leaders = (document.getElementById('assign_leaders_val').value || '').split(',').filter(Boolean);
  var engineers = (document.getElementById('assign_engineers_val').value || '').split(',').filter(Boolean);
  
  var deadline = document.getElementById('assign_deadline').value.trim();
  
  if (leaders.length === 0) { alert('请至少选择一位项目负责人'); return; }
  if (engineers.length === 0) { alert('请至少选择一位测试工程师'); return; }
  if (!deadline) { alert('请填写完成期限'); return; }
  
  // 检查负责人和工程师不能重叠
  var overlap = leaders.filter(function(l) { return engineers.indexOf(l) >= 0; });
  if (overlap.length > 0) { alert('以下人员同时被选为负责人和工程师，请调整：' + overlap.join('、')); return; }
  
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  
  t.leaders = leaders;
  t.engineers = engineers;
  t.deadline = deadline;
  t.inspector = engineers[0]; // 兼容旧字段，取第一位测试工程师
  
  t.stageHistory.push({ stage: '任务派工', date: ds, operator: LOGIN_USER, leaders: leaders, engineers: engineers, deadline: deadline });
  t.currentStage = '测试方案';
  
  alert('【原型演示】派工完成！\n项目负责人：' + leaders.join('、') + '\n测试工程师：' + engineers.join('、') + '\n完成期限：' + deadline + '\n进入下一阶段：测试方案（B.方案阶段）');
  closeModal();
  renderPage();
}

function pageSampleRefresh(preservePage) {
  var keyword = ((document.getElementById('sp_filter_keyword')||{}).value||'').toLowerCase();
  var source = ((document.getElementById('sp_filter_source')||{}).value||'');
  var type = ((document.getElementById('sp_filter_type')||{}).value||'');

  if (!preservePage) sp_page = 1;

  var allSamples = SAMPLES.filter(function(s) {
    if (keyword && s.sampleNo.toLowerCase().indexOf(keyword)===-1 && s.name.toLowerCase().indexOf(keyword)===-1) return false;
    if (source && s.source !== source) return false;
    if (type) {
      if (type === '其他') {
        if (['软件','硬件','电子文档','纸质文档'].indexOf(s.sampleType) >= 0) return false;
      } else if (s.sampleType !== type) return false;
    }
    return true;
  });

  // 按任务创建时间降序 → 样品编号升序
  allSamples.sort(function(a, b) {
    var tA = TASKS.filter(function(x){ return x.id===a.taskId; })[0];
    var tB = TASKS.filter(function(x){ return x.id===b.taskId; })[0];
    if ((tB?tB.createDate:'') !== (tA?tA.createDate:'')) return (tB?tB.createDate:'') > (tA?tA.createDate:'') ? 1 : -1;
    return a.sampleNo > b.sampleNo ? 1 : -1;
  });

  var totalCount = allSamples.length;
  var totalEl = document.getElementById('sp_totalCount');
  if (totalEl) totalEl.textContent = totalCount;

  // 全局状态统计
  var statusCounts = {};
  allSamples.forEach(function(s) { statusCounts[s.status] = (statusCounts[s.status] || 0) + 1; });
  var statusColors = {'已接收':'tag-green','检测中':'tag-blue','已归还':'tag-default','异常':'tag-red','待接收':'tag-orange'};

  // 全局分页
  var curPage = sp_page || 1;
  var totalPages = Math.max(1, Math.ceil(totalCount / sp_pageSize));
  if (curPage > totalPages) curPage = totalPages;
  if (curPage < 1) curPage = 1;
  sp_page = curPage;
  var startIdx = (curPage - 1) * sp_pageSize;
  var pageSamples = allSamples.slice(startIdx, startIdx + sp_pageSize);

  var html = '';

  if (totalCount === 0) {
    html += '<div class="card" style="text-align:center;padding:60px;color:#bbb">📭 没有匹配的样品记录</div>';
  } else {
    // 工具栏：新增样品（点击弹窗选任务）
    html += '<div class="card" style="margin-bottom:12px;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px">';
    html += '<button class="btn btn-primary btn-sm" onclick="showNewSampleDialog()">+ 新增样品</button>';
    html += '</div>';

    // 单一表格
    html += '<div class="card" style="padding:0;overflow:auto">';
    html += '<table style="margin:0">';
    html += '<thead><tr>';
    html += '<th style="min-width:210px">任务编号</th><th style="min-width:160px">任务名称</th>';
    html += '<th>样品编号</th><th>样品名称</th><th>样品类型</th><th>来源</th>';
    html += '<th>规格型号</th><th>数量</th><th>单位</th><th>存放位置</th>';
    html += '<th>状态</th><th>接收日期</th><th>操作</th></tr></thead><tbody>';

    var prevTaskId = null;
    var rowspanStart = 0;
    var i = 0;

    // 计算每行 rowspan：连续相同 taskId 的样品数
    function sameTaskRun(fromIdx) {
      var tid = pageSamples[fromIdx].taskId;
      var cnt = 0;
      for (var j = fromIdx; j < pageSamples.length; j++) {
        if (pageSamples[j].taskId === tid) cnt++; else break;
      }
      return cnt;
    }

    while (i < pageSamples.length) {
      var s = pageSamples[i];
      var rs = sameTaskRun(i);
      var t = TASKS.filter(function(x){ return x.id === s.taskId; })[0];

      for (var k = 0; k < rs; k++) {
        var sk = pageSamples[i + k];
        html += '<tr>';
        if (k === 0) {
          html += '<td rowspan="' + rs + '" style="vertical-align:middle;background:#fafafa;font-weight:bold;border-right:2px solid #e8e8e8">' + (t?t.id:'-') + '</td>';
          html += '<td rowspan="' + rs + '" style="vertical-align:middle;background:#fafafa;border-right:2px solid #e8e8e8">' + (t?t.proj:'-') + '</td>';
        }
        html += '<td>' + sk.sampleNo + '</td>';
        html += '<td>' + sk.name + '</td>';
        html += '<td><span class="tag tag-blue">' + (sk.sampleType||'-') + '</span></td>';
        html += '<td><span class="tag tag-orange">' + (sk.source||'-') + '</span></td>';
        html += '<td>' + sk.spec + '</td>';
        html += '<td>' + sk.qty + '</td>';
        html += '<td>' + sk.unit + '</td>';
        html += '<td>' + (sk.location||'-') + '</td>';
        html += '<td><span class="tag ' + (statusColors[sk.status]||'tag-default') + '">' + sk.status + '</span></td>';
        html += '<td>' + (sk.receiveDate||'-') + '</td>';
        html += '<td style="white-space:nowrap">';
        html += '<button class="btn btn-default btn-sm" onclick="showSampleDetail(\'' + sk.id + '\')">详情</button> ';
        html += '<button class="btn btn-default btn-sm" onclick="openSampleForm(\'' + sk.taskId + '\',\'' + sk.id + '\')">编辑</button> ';
        html += '<button class="btn btn-danger btn-sm" onclick="deleteSample(\'' + sk.taskId + '\',\'' + sk.id + '\')">删除</button>';
        html += '</td></tr>';
      }
      i += rs;
    }

    html += '</tbody></table>';

    // 分页控件
    if (totalPages > 1) {
      html += '<div style="padding:8px 16px;background:#fafafa;border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px">';
      html += '<button class="btn btn-default btn-sm" ' + (curPage <= 1 ? 'disabled' : 'onclick="sp_page=' + (curPage-1) + ';pageSampleRefresh(true)"') + '>◀ 上一页</button>';
      html += '<span style="color:#666">第 ' + curPage + ' / ' + totalPages + ' 页（共 ' + totalCount + ' 条）</span>';
      html += '<button class="btn btn-default btn-sm" ' + (curPage >= totalPages ? 'disabled' : 'onclick="sp_page=' + (curPage+1) + ';pageSampleRefresh(true)"') + '>下一页 ▶</button>';
      html += '</div>';
    }

    html += '</div>';
  }

  var listContainer = document.getElementById('sp_listContainer');
  if (listContainer) listContainer.innerHTML = html;
}

      '</table>';
    
    showModal('监督详情 — ' + s.id, body, '<button class="btn btn-default" onclick="closeModal()">关闭</button>');
  }
}


// ── 任务详情：流程图阶段点击查看详情 ──
function showStageDetail(taskId, stageName) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;

  var histMap = {};
  t.stageHistory.forEach(function(h) { histMap[h.stage] = h; });

  var h = histMap[stageName];
  var phaseLabels = { A: '前期准备', B: '方案阶段', C: '实施阶段', D: '问题处理', E: '报告阶段', F: '结项' };
  var phaseLabel = phaseLabels[STAGE_PHASE[stageName]] || '';

  // 高亮选中节点
  var nodes = document.querySelectorAll('#flowchart .stage-node');
  nodes.forEach(function(n) { n.classList.remove('stage-selected'); });
  var sel = document.querySelector('#flowchart .stage-node[data-stage="' + stageName + '"]');
  if (sel) { sel.classList.add('stage-selected'); sel.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }

  var html = '<div class="stage-detail-header">📋 ' + stageName + ' <span style="font-size:12px;color:#999">｜' + phaseLabel + ' 阶段</span></div>';

  if (h) {
    html += '<table class="stage-detail-table">';
    html += '<tr><td class="sdt-label">状态</td><td><span class="tag tag-green">已完成</span></td></tr>';
    html += '<tr><td class="sdt-label">完成日期</td><td>' + h.date + '</td></tr>';
    html += '<tr><td class="sdt-label">操作人' + (stageName === '样品接收' ? '（接收人）' : '') + '</td><td>' + h.operator + '</td></tr>';
    if (h.inspector) html += '<tr><td class="sdt-label">主检人</td><td>' + h.inspector + '</td></tr>';
    if (h.reviewer) html += '<tr><td class="sdt-label">复核人</td><td>' + h.reviewer + '</td></tr>';
    if (h.leaders) html += '<tr><td class="sdt-label">项目负责人</td><td>' + h.leaders.join('、') + '</td></tr>';
    if (h.engineers) html += '<tr><td class="sdt-label">测试工程师</td><td>' + h.engineers.join('、') + '</td></tr>';
    if (h.deadline) html += '<tr><td class="sdt-label">完成期限</td><td>' + h.deadline + '</td></tr>';
    if (h.file) html += '<tr><td class="sdt-label">关联文件</td><td>📄 ' + h.file + '</td></tr>';
    if (h.result) html += '<tr><td class="sdt-label">评审结果</td><td>' + (h.result === '通过' ? '<span class="tag tag-green">通过</span>' : '<span class="tag tag-red">' + h.result + '</span>') + '</td></tr>';
    if (h.hasIssue !== undefined) html += '<tr><td class="sdt-label">是否发现问题</td><td>' + (h.hasIssue ? '<span class="tag tag-orange">是</span>' : '<span class="tag tag-green">否</span>') + '</td></tr>';
    html += '</table>';
  } else if (stageName === t.currentStage) {
    html += '<table class="stage-detail-table">';
    html += '<tr><td class="sdt-label">状态</td><td><span class="tag tag-blue">当前阶段</span> 🔄 待处理</td></tr>';
    html += '<tr><td class="sdt-label">所属阶段</td><td>' + phaseLabel + '</td></tr>';
    html += '</table>';
    html += '<div style="margin-top:12px;padding:12px;background:#e6f7ff;border-radius:6px;border-left:3px solid #1890ff">';
    html += '<b>💡 操作提示：</b>此阶段为当前所处位置，请在任务列表中使用对应按钮推进流程。';
    html += '</div>';
  } else {
    html += '<table class="stage-detail-table">';
    html += '<tr><td class="sdt-label">状态</td><td><span style="color:#bbb">尚未到达</span></td></tr>';
    html += '<tr><td class="sdt-label">所属阶段</td><td>' + phaseLabel + '</td></tr>';
    html += '</table>';
    html += '<div style="margin-top:12px;padding:12px;background:#fafafa;border-radius:6px;color:#999">';
    html += '⏳ 任务推进至此阶段后将自动激活。';
    html += '</div>';
  }

  // 样品接收阶段：只读查看样品清单
  if (stageName === '样品接收') {
    var taskSamples = SAMPLES.filter(function(s) { return s.taskId === taskId; });
    html += '<div style="margin-top:16px"><div style="font-weight:bold;margin-bottom:8px">🧪 样品清单（' + taskSamples.length + ' 个）</div>';
    html += '<button class="btn btn-primary btn-sm" style="margin-bottom:8px" onclick="sampleFocusTask=\'' + taskId + '\';navTo(\'sample\')">📋 前往样品管理</button>';
    html += '<div>' + renderSampleTableRO(taskId) + '</div></div>';
  }

  var panel = document.getElementById('stageDetailPanel');
  if (panel) panel.innerHTML = html;
}
function showSampleInline(taskId) {
  var panel = document.getElementById('stageDetailPanel');
  if (!panel) return;
  var taskSamples = SAMPLES.filter(function(s) { return s.taskId === taskId; });
  var html = '<div class="stage-detail-header">🧪 样品清单 <span style="font-size:12px;color:#999">｜共 ' + taskSamples.length + ' 个样品</span></div>';
  html += '<div style="margin-bottom:8px"><button class="btn btn-primary btn-sm" onclick="sampleFocusTask=\'' + taskId + '\';navTo(\'sample\')">📋 前往样品管理</button></div>';
  html += '<div>' + renderSampleTableRO(taskId) + '</div>';
  panel.innerHTML = html;
  var nodes = document.querySelectorAll('#flowchart .stage-node');
  nodes.forEach(function(n) { n.classList.remove('stage-selected'); });
}

  closeModal();
}
