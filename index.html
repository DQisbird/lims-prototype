.nav-parent.open .arrow{transform:rotate(90deg)}

.nav-parent.open+.nav-children{display:block}
.nav-child{padding:8px 20px 8px 36px;font-size:12px;cursor:pointer;transition:background .2s}
.nav-child:hover{background:#002140}
.nav-child.active{background:#1890ff;color:#fff}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 20px;font-size:14px;justify-content:space-between}

.content{flex:1;overflow-y:auto;padding:20px}

.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.toolbar input{width:160px}
.btn{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#1890ff;color:#fff}
.btn-success{background:#52c41a;color:#fff}
.btn-warning{background:#faad14;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0}
th{background:#fafafa;font-weight:600;color:#555}

.tag-red{background:#fff2f0;color:#ff4d4f}

.modal-wide{width:960px}

    h += '</div>';
  });
  nav.innerHTML = h;
}

function navTo(id) {

// ============================================================
// 工具函数
// ============================================================
function statusTag(s) {
  var m = { '通过': 'green', '评审中': 'orange', '不通过': 'red', '未提交': 'default', '待处理': 'orange', '已处理': 'green' };
  return '<span class="tag tag-' + (m[s] || 'blue') + '">' + s + '</span>';
}

function showModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function makeForm(fields) {
  return fields.map(function(f) {
    var star = f.r ? '<span style="color:red">*</span>' : '';
    return '<div class="form-group"><label>' + (f.l || '') + star + '</label><div class="form-ctl">' + f.h + '</div></div>';
  }).join('');
}

function makeSelect(name, opts, val) {
  var h = '<select id="' + name + '">';
  opts.forEach(function(o) {
    h += '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>';
  });
  return h + '</select>';
}

// ============================================================
// 弹框多选组件（支持搜索）
// ============================================================
function multiSelectHtml(id, selected, options, placeholder) {
  var tags = '';
  selected.forEach(function(v) {
    var label = options[v] || v;
    tags += '<span class="ts-tag">' + label + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">' + (placeholder || '点击选择') + '</span>';
  return '<div class="tag-select" id="ts-' + id + '" onclick="multiSelectOpen(\'' + id + '\')">' + tags + '</div>';
}

function multiSelectOpen(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var optKeys = Object.keys(options);

  var rows = optKeys.map(function(k) {
    var checked = selected.indexOf(k) >= 0 ? ' checked' : '';
    return '<label class="ms-opt" data-v="' + k + '"><input type="checkbox"' + checked + '>' + options[k] + '</label>';
  }).join('');

  var body = '<input type="text" id="ms-search-' + id + '" placeholder="&#128269; 输入关键词搜索..." style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;margin-bottom:12px" oninput="multiSelectSearch(\'' + id + '\')">' +
    '<div class="ms-list" id="ms-list-' + id + '">' + rows + '</div>' +
    '<div style="margin-top:8px;color:#999;font-size:12px">已选 <b id="ms-count-' + id + '">' + selected.length + '</b> / ' + optKeys.length + ' 项</div>';

  var footer = '<button class="btn btn-default" onclick="closeModal()">取消</button>' +
    '<button class="btn btn-primary" onclick="multiSelectConfirm(\'' + id + '\')">确定</button>';

  showModal('选择', body, footer);
}

function multiSelectSearch(id) {
  var q = (document.getElementById('ms-search-' + id).value || '').toLowerCase();
  var items = document.getElementById('ms-list-' + id).querySelectorAll('.ms-opt');
  items.forEach(function(item) {
    item.style.display = item.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
}

function multiSelectConfirm(id) {
  var boxes = document.getElementById('ms-list-' + id).querySelectorAll('input[type="checkbox"]');
  var selected = [];
  boxes.forEach(function(cb) {
    if (cb.checked) selected.push(cb.closest('.ms-opt').getAttribute('data-v'));
  });

  var hidden = document.getElementById(id);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
  closeModal();
}

function multiSelectRefresh(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var tags = '';
  selected.forEach(function(v) {
    tags += '<span class="ts-tag">' + (options[v] || v) + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">点击选择</span>';
  document.getElementById('ts-' + id).innerHTML = tags;
}

function multiSelectRemove(id, val) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var idx = selected.indexOf(val);
  if (idx >= 0) selected.splice(idx, 1);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
}

function renderPage() {

function pagePlaceholder(title) {

// 待办工单
// ============================================================
function pageTodo() {
  var todos = [];

    return '<tr><td>' + t.type + '</td><td>' + t.project + '</td><td>' + t.client + '</td><td>' + t.date + '</td><td>' + t.refId + '</td>' +

      '<div style="color:#666;font-size:13px">当前登录：<b>' + LOGIN_USER + '</b>（质量负责人）&nbsp;|&nbsp;共 <b>' + todos.length + '</b> 条</div>' +
      '<input type="text" placeholder="搜索项目/客户/编号..." style="width:220px;padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px" oninput="filterTable(this.value,\'todoTable\')">' +
    '</div>' +
    '<table id="todoTable"><thead><tr>' +
      '<th>工单类型</th><th>项目名称</th><th>客户名称</th><th>分配日期</th><th>编号</th><th>操作</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

// ============================================================
// 已办工单
// ============================================================
function pageDone() {
  var doneList = [];
  REVIEWS.forEach(function(r) {
    if (r.status === 'done') {
      var isReviewer = r.reviewers.some(function(rv) { return rv.name === LOGIN_USER; });
      if (isReviewer) {
        doneList.push({ id: r.id, project: r.proj, client: r.client, date: r.date, conclusion: r.conclusion, type: '合同评审' });
      }
    }
  });

  doneList.sort(function(a, b) { return b.date.localeCompare(a.date); });

  if (doneList.length === 0) {
    return '<div class="card"><div class="card-title">已办工单</div><div style="text-align:center;padding:40px;color:#999;font-size:15px">暂无已办工单</div></div>';
  }

  var rows = doneList.map(function(d) {
    return '<tr><td>' + d.type + '</td><td>' + d.project + '</td><td>' + d.client + '</td><td>' + d.date + '</td><td>' + d.id + '</td>' +
      '<td>' + statusTag(d.conclusion) + '</td>' +
      '<td><button class="btn btn-default btn-sm" onclick="viewReviewWorksheet(\'' + d.id + '\')">查看</button></td></tr>';
  }).join('');

  return '<div class="card"><div class="card-title">已办工单</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<div style="color:#666;font-size:13px">当前登录：<b>' + LOGIN_USER + '</b>（质量负责人）&nbsp;|&nbsp;共 <b>' + doneList.length + '</b> 条</div>' +
      '<input type="text" placeholder="搜索项目/客户/编号..." style="width:220px;padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px" oninput="filterTable(this.value,\'doneTable\')">' +
    '</div>' +
    '<table id="doneTable"><thead><tr>' +
      '<th>工单类型</th><th>项目名称</th><th>客户名称</th><th>日期</th><th>编号</th><th>评审结论</th><th>操作</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

// ============================================================
// 表格搜索过滤
// ============================================================
function filterTable(keyword, tableId) {
  var tbody = document.querySelector('#' + tableId + ' tbody');
  if (!tbody) return;
  var rows = tbody.querySelectorAll('tr');
  var kw = keyword.toLowerCase();
  rows.forEach(function(row) {
    row.style.display = kw ? (row.textContent.toLowerCase().indexOf(kw) >= 0 ? '' : 'none') : '';
  });
}
// ============================================================
// 1.1 合同评审 - 列表页
// ============================================================
function reviewActionBtns(r) {
  if (r.status === 'draft') return '<button class="btn btn-default btn-sm" onclick="showReviewForm(\'' + r.id + '\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="deleteReview(\'' + r.id + '\')">删除</button>';
  if (r.status === 'pending') return '<button class="btn btn-primary btn-sm" onclick="viewReviewWorksheet(\'' + r.id + '\')">评审工单</button>';
  var btns = '<button class="btn btn-primary btn-sm" onclick="viewReviewWorksheet(\'' + r.id + '\')">评审工单</button> <button class="btn btn-default btn-sm" onclick="printReview(\'' + r.id + '\')">&#128424; 打印</button>';
  if (r.conclusion === '不通过') btns += ' <button class="btn btn-warning btn-sm" onclick="refireReview(\'' + r.id + '\')">重新发起</button>';
  return btns;
}

function reviewTableRows(data) {
  return data.map(function(r) {
    return '<tr><td><a href="javascript:void(0)" style="color:#1890ff" onclick="viewReview(\'' + r.id + '\')">' + r.id + '</a></td>' +
      '<td>' + r.proj + '</td><td>' + r.client + '</td><td>' + r.ctype + '</td>' +
      '<td>' + r.domains.map(function(d) { return DOMAIN_LABELS[d] + '(' + d + ')'; }).join('、') + '</td><td>' + statusTag(r.conclusion) + '</td>' +
      '<td>' + r.date + '</td><td>' + r.initiator + '</td><td>' + reviewActionBtns(r) + '</td></tr>';

function reviewToolbar() {
  return '<div class="toolbar">' +
    '<input placeholder="评审编号" id="rf_filter_id">' +
    '<input placeholder="项目名称" id="rf_filter_proj">' +
    '<input placeholder="客户名称" id="rf_filter_client">' +
    '<select id="rf_filter_conclusion"><option value="">全部结论</option><option>未提交</option><option>评审中</option><option>通过</option><option>不通过</option></select>' +
    '<input type="date" id="rf_filter_from">-<input type="date" id="rf_filter_to">' +
    '<button class="btn btn-primary" onclick="filterReviews()">&#128269; 查询</button>' +
    '<button class="btn btn-success" onclick="showReviewForm()">发起评审</button>' +
    '</div>';
}

function reviewPagination() {
  var total = Math.ceil(reviewFilteredData.length / reviewPageSize);
  if (total <= 1) return '';
  var html = '<div style="display:flex;justify-content:center;align-items:center;gap:6px;margin-top:16px;font-size:13px;flex-wrap:wrap">';
  if (reviewPage > 1) html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + (reviewPage - 1) + ')">上一页</button>';
  var start = Math.max(1, reviewPage - 3), end = Math.min(total, reviewPage + 3);
  if (start > 1) { html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(1)">1</button>'; if (start > 2) html += '<span style="color:#999">…</span>'; }
  for (var i = start; i <= end; i++) {
    html += '<button class="btn btn-sm" style="' + (i === reviewPage ? 'background:#1890ff;color:#fff' : 'background:#fff;color:#333;border:1px solid #d9d9d9') + '" onclick="goReviewPage(' + i + ')">' + i + '</button>';
  }
  if (end < total) { if (end < total - 1) html += '<span style="color:#999">…</span>'; html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + total + ')">' + total + '</button>'; }
  if (reviewPage < total) html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + (reviewPage + 1) + ')">下一页</button>';
  html += '<span style="color:#999;margin-left:8px">第' + reviewPage + '页/共' + total + '页（' + reviewFilteredData.length + '条）</span></div>';
  return html;
}

function renderReviewList() {
  var total = reviewFilteredData.length;
  var start = (reviewPage - 1) * reviewPageSize;
  var pageData = reviewFilteredData.slice(start, start + reviewPageSize);
  var emptyRow = total === 0 ? '<tr><td colspan="9" style="text-align:center;color:#999;padding:40px">暂无数据</td></tr>' : '';
  return '<div class="card"><div class="card-title">合同评审</div>' +
    reviewToolbar() +
    '<table><thead><tr><th>评审编号</th><th>项目名称</th><th>客户名称</th><th>合同类型</th><th>拟检测领域</th><th>评审结论</th><th>评审日期</th><th>发起人</th><th>操作</th></tr></thead>' +
    '<tbody>' + (emptyRow || reviewTableRows(pageData)) + '</tbody></table>' +
    reviewPagination() + '</div>';
}

function goReviewPage(n) { reviewPage = n; document.getElementById('content').innerHTML = renderReviewList(); }

function pageReview() {
  reviewFilteredData = REVIEWS;
  reviewPage = 1;
  return renderReviewList();
}

function filterReviews() {
  var id = (document.getElementById('rf_filter_id').value || '').toLowerCase();
  var proj = (document.getElementById('rf_filter_proj').value || '').toLowerCase();
  var client = (document.getElementById('rf_filter_client').value || '').toLowerCase();
  var conclusion = document.getElementById('rf_filter_conclusion').value;
  reviewFilteredData = REVIEWS.filter(function(r) {
    if (id && r.id.toLowerCase().indexOf(id) < 0) return false;
    if (proj && r.proj.toLowerCase().indexOf(proj) < 0) return false;
    if (client && r.client.toLowerCase().indexOf(client) < 0) return false;
    if (conclusion && r.conclusion !== conclusion) return false;
    return true;
  });
  reviewPage = 1;
  document.getElementById('content').innerHTML = renderReviewList();
}

// ============================================================
// 1.1 合同评审 - 弹窗①：发起/编辑合同评审
// ============================================================
function showReviewForm(editId) {
  var editR = null;
  if (editId) { editR = REVIEWS.filter(function(x) { return x.id === editId; })[0]; }
  var dOpts = {};
  DOMAINS.forEach(function(d) { dOpts[d] = DOMAIN_LABELS[d] + ' (' + d + ')'; });
  var pOpts = {};
  PERSONNEL.forEach(function(p) { pOpts[p.name + ' (' + p.role + ')'] = p.name + ' (' + p.role + ')'; });

  // 生成默认编号（当天去重）
  var today = fmt(NOW);
  var baseId = 'TZJC/JSJL-HTPS' + today;
  var sameDay = REVIEWS.filter(function(r) { return r.id.indexOf(baseId) === 0; });
  var defaultId = sameDay.length === 0 ? baseId : baseId + '-' + (sameDay.length + 1);

  // 编辑时使用已有数据
  var init = editR || {};
  var selDomains = init.domains || [];
  var selReviewers = (init.reviewers || []).map(function(rv) { return rv.name + ' (' + rv.role + ')'; });

  var dTags = multiSelectHtml('rf_domains', selDomains, dOpts, '点击选择检测领域');
  var pTags = multiSelectHtml('rf_reviewers', selReviewers, pOpts, '点击选择评审人员');

  var body = makeForm([
    { l: '评审编号', r: 1, h: '<input id="rf_id" value="' + (editR ? editR.id : defaultId) + '" placeholder="TZJC/JSJL-{类型}{日期}"' + (editR ? '' : '') + '>' },
    { l: '项目名称', r: 1, h: '<input id="rf_proj" value="' + (init.proj || '') + '" placeholder="请输入项目名称">' },
    { l: '客户名称', r: 1, h: '<input id="rf_client" value="' + (init.client || '') + '" placeholder="请输入客户名称">' },
    { l: '联系人', r: 1, h: '<input id="rf_contact" value="' + (init.contact || '') + '" placeholder="请输入联系人">' },
    { l: '联系方式', r: 1, h: '<input id="rf_phone" value="' + (init.phone || '') + '" placeholder="请输入联系方式">' },
    { l: '合同类型', r: 1, h: makeSelect('rf_ctype', ['框架合同', '年度合同', '单次合同'], init.ctype || '') },
    { l: '检测内容', r: 1, h: '<textarea id="rf_content" rows="3" placeholder="请输入检测内容描述">' + (init.testContent || '') + '</textarea>' },
    { l: '检测标准依据', r: 1, h: '<input id="rf_standard" value="' + (init.standardBasis || '') + '" placeholder="如：GB/T 25000.51-2016">' },
    { l: '合同金额', h: '<input id="rf_amount" type="number" value="' + (init.contractAmount || '') + '" placeholder="单位：元">' },
    { l: '交付期', h: '<input id="rf_deliveryDate" type="date" value="' + (init.deliveryDate || '') + '">' },
    { l: '交付方式', h: '<input id="rf_deliveryMethod" value="' + (init.deliveryMethod || '') + '" placeholder="如：电子版报告+纸质盖章版">' },
    { l: '是否使用标识', r: 1, h: makeSelect('rf_useLogo', ['否', '是'], init.useLogo || '') },
    { l: '其他要求说明', h: '<textarea id="rf_other" rows="2" placeholder="如有特殊要求请说明">' + (init.otherRequirements || '') + '</textarea>' },
    { l: '拟检测领域', r: 1, h: '<input type="hidden" id="rf_domains" data-sel=\'' + JSON.stringify(selDomains) + '\' data-opts=\'' + JSON.stringify(dOpts) + '\'>' + dTags },
    { l: '评审人员', r: 1, h: '<input type="hidden" id="rf_reviewers" data-sel=\'' + JSON.stringify(selReviewers) + '\' data-opts=\'' + JSON.stringify(pOpts) + '\'>' + pTags }
  ]);
  body += '<div style="color:#999;font-size:12px;margin-top:8px">&#9888; 评审人员必须包含<b>质量负责人</b>和<b>部门负责人</b></div>';

  var footer = '<button class="btn btn-default" onclick="saveReviewDraft(\'' + (editId || '') + '\')">保存</button>' +
    '<button class="btn btn-primary" onclick="submitNewReview(\'' + (editId || '') + '\')">提交评审</button>';
  showModal(editR ? '编辑合同评审 - ' + editR.id : '发起合同评审', body, footer);
}

function collectReviewForm() {
  var rid = (document.getElementById('rf_id').value || '').trim();
  var p = (document.getElementById('rf_proj').value || '').trim();
  var cl = (document.getElementById('rf_client').value || '').trim();
  var ct = (document.getElementById('rf_contact').value || '').trim();
  var ph = (document.getElementById('rf_phone').value || '').trim();
  var content = (document.getElementById('rf_content').value || '').trim();
  var standard = (document.getElementById('rf_standard').value || '').trim();
  var ctype = document.getElementById('rf_ctype').value;
  var domains = JSON.parse(document.getElementById('rf_domains').getAttribute('data-sel') || '[]');
  var reviewersRaw = JSON.parse(document.getElementById('rf_reviewers').getAttribute('data-sel') || '[]');
  var reviewers = reviewersRaw.map(function(r) {
    var m = r.match(/^(.+?) \((.+?)\)$/);
    return { name: m[1], role: m[2], result: '', items: {}, comment: '' };
  });
  return {
    id: rid, proj: p, client: cl, contact: ct, phone: ph, ctype: ctype,
    testContent: content, standardBasis: standard,
    contractAmount: parseFloat(document.getElementById('rf_amount').value) || 0,
    deliveryDate: document.getElementById('rf_deliveryDate').value,
    deliveryMethod: document.getElementById('rf_deliveryMethod').value,
    useLogo: document.getElementById('rf_useLogo').value,
    otherRequirements: document.getElementById('rf_other').value,
    domains: domains, reviewers: reviewers
  };
}

// 保存草稿（状态=未提交）
function saveReviewDraft(editId) {
  var data = collectReviewForm();
  if (!data.id) { alert('请输入评审编号'); return; }
  if (!data.proj || !data.client) { alert('请至少填写项目名称和客户名称'); return; }

  if (editId) {
    // 编辑模式：更新已有记录
    var idx = -1;
    REVIEWS.forEach(function(r, i) { if (r.id === editId) idx = i; });
    if (idx >= 0) {
      data.conclusion = '未提交'; data.date = REVIEWS[idx].date; data.initiator = REVIEWS[idx].initiator; data.status = 'draft';
      REVIEWS[idx] = data;
    }
    closeModal(); navTo('review');
    alert('已保存（未提交）');
  } else {
    // 新增
    var dup = REVIEWS.filter(function(r) { return r.id === data.id; });
    if (dup.length > 0) { alert('评审编号已存在：' + data.id); return; }
    data.conclusion = '未提交'; data.date = fmt(NOW); data.initiator = LOGIN_USER; data.status = 'draft';
    REVIEWS.push(data);
    closeModal(); navTo('review');
    alert('已保存（未提交），编号：' + data.id);
  }
}

// 提交评审（状态=评审中）
function submitNewReview(editId) {
  var data = collectReviewForm();
  if (!data.id) { alert('请输入评审编号'); return; }
  if (!data.proj || !data.client || !data.contact || !data.phone || !data.testContent || !data.standardBasis) { alert('请填写所有必填字段'); return; }
  if (data.domains.length === 0) { alert('请选择至少一个检测领域'); return; }
  if (data.reviewers.length === 0) { alert('请选择评审人员'); return; }

  var hasZL = data.reviewers.some(function(rv) { return rv.role.indexOf('质量负责人') >= 0; });
  var hasBM = data.reviewers.some(function(rv) { return rv.role.indexOf('部门负责人') >= 0; });
  if (!hasZL || !hasBM) { alert('评审人员必须包含质量负责人和部门负责人'); return; }

  if (editId) {
    // 编辑模式：更新已有记录并提交
    var idx = -1;
    REVIEWS.forEach(function(r, i) { if (r.id === editId) idx = i; });
    if (idx >= 0) {
      data.conclusion = '评审中'; data.date = fmt(NOW); data.initiator = REVIEWS[idx].initiator; data.status = 'pending';
      // 保留已填写的评审数据
      data.reviewers = REVIEWS[idx].reviewers;
      REVIEWS[idx] = data;
    }
    closeModal(); navTo('review');
    alert('已提交评审！');
  } else {
    // 新增
    var dup = REVIEWS.filter(function(r) { return r.id === data.id; });
    if (dup.length > 0) { alert('评审编号已存在：' + data.id + '，请修改'); return; }
    data.conclusion = '评审中'; data.date = fmt(NOW); data.initiator = LOGIN_USER; data.status = 'pending';
    REVIEWS.push(data);
    closeModal(); navTo('review');
    alert('评审已发起！编号：' + data.id);
  }
}

// ============================================================
// 1.1 合同评审 - 弹窗：查看评审详情
// ============================================================
function viewReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  showModal('评审详情 - ' + id, makeForm([
    { l: '评审编号', h: '<input value="' + r.id + '" readonly>' },
    { l: '项目名称', h: '<input value="' + r.proj + '" readonly>' },
    { l: '客户名称', h: '<input value="' + r.client + '" readonly>' },
    { l: '联系人', h: '<input value="' + r.contact + '" readonly>' },
    { l: '联系方式', h: '<input value="' + r.phone + '" readonly>' },
    { l: '合同类型', h: '<input value="' + r.ctype + '" readonly>' },
    { l: '拟检测领域', h: '<input value="' + r.domains.join(',') + '" readonly>' },
    { l: '检测内容', h: '<textarea readonly rows="2">' + r.testContent + '</textarea>' },
    { l: '检测标准依据', h: '<input value="' + r.standardBasis + '" readonly>' },
    { l: '合同金额', h: '<input value="¥' + (r.contractAmount || 0).toLocaleString() + '" readonly>' },
    { l: '交付期', h: '<input value="' + (r.deliveryDate || '-') + '" readonly>' },
    { l: '交付方式', h: '<input value="' + (r.deliveryMethod || '-') + '" readonly>' },
    { l: '是否使用标识', h: '<input value="' + (r.useLogo || '否') + '" readonly>' },
    { l: '其他要求', h: '<textarea readonly rows="2">' + (r.otherRequirements || '') + '</textarea>' },
    { l: '评审结论', h: '<input value="' + r.conclusion + '" readonly>' },
    { l: '评审日期', h: '<input value="' + r.date + '" readonly>' },
    { l: '发起人', h: '<input value="' + r.initiator + '" readonly>' }
  ]));
}

// ============================================================
// 1.1 合同评审 - 弹窗②：评审工单
// ============================================================
var ITEM_LABELS = {
  staff: '人员配备是否满足',
  device: '设备配备是否满足',
  env: '环境条件是否满足',
  delivery: '是否可在项目周期内交付',
  sample: '样品管理条件是否满足',
  outsource: '是否分包',
  risk: '是否有风险',
  scope: '检测标准依据是否在能力范围内'
};
var ITEM_KEYS = ['staff', 'device', 'env', 'delivery', 'sample', 'outsource', 'risk', 'scope'];

function reviewDetailTable(r) {
  return '<table class="ws-info-table">' +
    '<tr><td colspan="2" class="ws-section">基本信息</td></tr>' +
    '<tr><td>评审编号</td><td>' + r.id + '</td></tr>' +
    '<tr><td>项目名称</td><td>' + r.proj + '</td></tr>' +
    '<tr><td>客户名称</td><td>' + r.client + '</td></tr>' +
    '<tr><td>联系人</td><td>' + r.contact + '</td></tr>' +
    '<tr><td>联系方式</td><td>' + r.phone + '</td></tr>' +
    '<tr><td>合同类型</td><td>' + r.ctype + '</td></tr>' +
    '<tr><td>检测领域</td><td>' + r.domains.join('、') + '</td></tr>' +
    '<tr><td colspan="2" class="ws-section">检测详情</td></tr>' +
    '<tr><td>检测内容</td><td>' + r.testContent + '</td></tr>' +
    '<tr><td>标准依据</td><td>' + r.standardBasis + '</td></tr>' +
    '<tr><td>合同金额</td><td>¥' + (r.contractAmount || 0).toLocaleString() + '</td></tr>' +
    '<tr><td>交付期</td><td>' + (r.deliveryDate || '-') + '</td></tr>' +
    '<tr><td>交付方式</td><td>' + (r.deliveryMethod || '-') + '</td></tr>' +
    '<tr><td>使用标识</td><td>' + (r.useLogo || '否') + '</td></tr>' +
    '<tr><td>其他要求</td><td>' + (r.otherRequirements || '无') + '</td></tr>' +
    '<tr><td colspan="2" class="ws-section">评审状态</td></tr>' +
    '<tr><td>评审结论</td><td>' + statusTag(r.conclusion) + '</td></tr>' +
    '<tr><td>评审日期</td><td>' + r.date + '</td></tr>' +
    '<tr><td>发起人</td><td>' + r.initiator + '</td></tr>' +
    '</table>';
}

function viewReviewWorksheet(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  document.querySelector('.modal').classList.add('modal-wide');

  var leftHtml = '<div class="ws-left">' + reviewDetailTable(r) + '</div>';
  var rightHtml;

  if (r.status === 'done') {
    var tables = r.reviewers.map(function(rv) {
      var rows = ITEM_KEYS.map(function(k) {
        return '<tr><td>' + ITEM_LABELS[k] + '</td><td>' + (rv.items[k] || '-') + '</td></tr>';
      }).join('');
      return '<div style="margin-bottom:12px;border:1px solid #f0f0f0;border-radius:6px;overflow:hidden">' +
        '<div style="padding:6px 10px;background:#fafafa;font-weight:bold;font-size:13px">' + rv.name + '（' + rv.role + '）— ' + statusTag(rv.result || '未填写') +
        (rv.comment ? ' <span style="color:#999;font-weight:normal;font-size:11px">' + rv.comment + '</span>' : '') + '</div>' +
        '<table class="review-items-table">' + rows + '</table></div>';
    }).join('');
    rightHtml = '<div class="ws-right"><div class="ws-right-title">评审明细（已完成）</div>' + tables + '</div>';
  } else {
    var rows = r.reviewers.map(function(rv, i) {
      var filled = rv.result ? true : false;
      var isMe = rv.name === LOGIN_USER;
      var btnHtml = isMe
        ? '<button class="btn btn-primary btn-sm" onclick="fillReviewWorksheet(\'' + id + '\',' + i + ')">' + (filled ? '修改' : '填写') + '</button>'
        : (filled ? statusTag(rv.result) : '<span style="color:#bbb;font-size:11px">等待填写</span>');
      return '<tr><td>' + rv.name + '</td><td>' + rv.role + '</td>' +
        '<td>' + (filled ? statusTag(rv.result) : '<span style="color:#999">未填写</span>') + '</td>' +
        '<td>' + btnHtml + '</td></tr>';
    }).join('');
    rightHtml = '<div class="ws-right"><div class="ws-right-title">评审人员填写进度</div>' +
      '<table><thead><tr><th>评审人</th><th>角色</th><th>结论</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:16px;text-align:center"><button class="btn btn-warning" onclick="finalizeReview(\'' + id + '\')">汇总评审结论</button></div>' +
      '</div>';
  }

  showModal('评审工单 - ' + r.id, '<div class="ws-layout">' + leftHtml + rightHtml + '</div>');
  // 移除 modal-wide，避免影响其他弹窗
  setTimeout(function() { document.querySelector('.modal').classList.remove('modal-wide'); }, 100);
}

function fillReviewWorksheet(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];
  if (rv.name !== LOGIN_USER) { alert('只能填写自己的评审意见'); return; }
  document.querySelector('.modal').classList.add('modal-wide');

  var itemFields = ITEM_KEYS.map(function(k) {
    return { l: ITEM_LABELS[k], r: 1, h: makeSelect('rwi_' + k, ['是', '否'], rv.items[k] || '') };
  });

  var leftHtml = '<div class="ws-left">' + reviewDetailTable(r) + '</div>';
  var formHtml = makeForm(itemFields.concat([
    { l: '评审结论', r: 1, h: makeSelect('rwi_conclusion', ['通过', '不通过'], rv.result || '') },
    { l: '不通过原因', h: '<textarea id="rwi_comment" rows="2" placeholder="不通过时请填写原因">' + (rv.comment || '') + '</textarea>' }
  ]));
  var rightHtml = '<div class="ws-right"><div class="ws-right-title">填写评审 — ' + rv.name + '（' + rv.role + '）</div>' + formHtml + '</div>';

  var footer = '<button class="btn btn-primary" onclick="submitReviewItem(\'' + id + '\',' + idx + ')">保存</button>';
  showModal('填写评审工单 — ' + rv.name, '<div class="ws-layout">' + leftHtml + rightHtml + '</div>', footer);
  setTimeout(function() { document.querySelector('.modal').classList.remove('modal-wide'); }, 100);
}

function submitReviewItem(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];
  var conclusion = document.getElementById('rwi_conclusion').value;
  var comment = (document.getElementById('rwi_comment').value || '').trim();

  if (conclusion === '不通过' && !comment) {
    alert('不通过时必须填写不通过原因');
    return;
  }

  rv.result = conclusion;
  rv.comment = comment;
  ITEM_KEYS.forEach(function(k) {
    rv.items[k] = document.getElementById('rwi_' + k).value;
  });

  closeModal();
  viewReviewWorksheet(id);
  renderNav();
  alert(rv.name + ' 评审工单已保存');
}

function finalizeReview(id) {
  // 只有质量负责人才能汇总评审结论
  if (LOGIN_USER !== '张工') { alert('仅质量负责人可汇总评审结论'); return; }
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  // Check all reviewers have filled
  var unfilled = r.reviewers.filter(function(rv) { return !rv.result; });
  if (unfilled.length > 0) {
    var names = unfilled.map(function(rv) { return rv.name; }).join('、');
    alert('以下评审人尚未填写：' + names);
    return;
  }

  var allPass = r.reviewers.every(function(rv) { return rv.result === '通过'; });
  if (allPass) {
    r.conclusion = '通过';
    r.status = 'done';
    closeModal();
    navTo('review');
    alert('全员通过！评审已通过，可进入合同签订阶段。');
  } else {
    r.conclusion = '不通过';
    r.status = 'done';
    var failNames = r.reviewers.filter(function(rv) { return rv.result === '不通过'; }).map(function(rv) { return rv.name; }).join('、');
    closeModal();
    navTo('review');
    alert('评审不通过！不通过人员：' + failNames + '。流程终止。');
  }
}

// ============================================================
// 1.1 合同评审 - 打印
// ============================================================
function printReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  var w = window.open('', '_blank', 'width=900,height=700');

  var domainStr = r.domains.map(function(d) { return DOMAIN_LABELS[d] + '(' + d + ')'; }).join('、');

  // 构建评审人记录HTML
  var reviewerHtml = '';
  r.reviewers.forEach(function(rv, i) {
    var itemRows = '';
    for (var j = 0; j < ITEM_KEYS.length; j += 2) {
      var k1 = ITEM_KEYS[j], k2 = ITEM_KEYS[j + 1];
      itemRows += '<tr>' +
        '<td width="180">' + ITEM_LABELS[k1] + '</td><td width="60" style="text-align:center">' + (rv.items[k1] || '-') + '</td>' +
        (k2 ? '<td width="180">' + ITEM_LABELS[k2] + '</td><td width="60" style="text-align:center">' + (rv.items[k2] || '-') + '</td>' : '<td></td><td></td>') +
        '</tr>';
    }
    reviewerHtml +=
      '<h3>评审人' + (i + 1) + '：' + rv.name + '（' + rv.role + '）</h3>' +
      '<table>' + itemRows + '</table>' +
      '<p style="margin:8px 0 16px"><b>评审结论：</b>' + (rv.result || '待评审') +
      '　|　<b>评审意见：</b>' + (rv.comment || '无') + '</p>';
  });

  w.document.write(
    '<html><head><title>' + r.id + '</title>' +
    '<style>' +
    'body{font-family:SimSun;padding:20px;color:#000}' +
    'table{border-collapse:collapse;width:100%;margin-bottom:8px}' +
    'td,th{border:1px solid #000;padding:6px;font-size:13px}' +
    'h2{text-align:center;margin-bottom:4px}' +
    'h3{margin:16px 0 4px;font-size:14px}' +
    '@media print{body{padding:10px}}' +
    '</style></head><body>' +
    '<h2>合同评审记录表</h2>' +
    '<p style="text-align:center;margin-top:0">编号：' + r.id + '　|　日期：' + r.date + '</p>' +

    '<table>' +
    '<tr><td width="100">项目名称</td><td>' + r.proj + '</td><td width="100">客户名称</td><td>' + r.client + '</td></tr>' +
    '<tr><td>联系人</td><td>' + r.contact + '</td><td>联系方式</td><td>' + r.phone + '</td></tr>' +
    '<tr><td>合同类型</td><td>' + r.ctype + '</td><td>检测领域</td><td>' + domainStr + '</td></tr>' +
    '<tr><td>合同金额</td><td>' + (r.contractAmount ? (r.contractAmount >= 10000 ? (r.contractAmount/10000).toFixed(1) + '万元' : r.contractAmount + '元') : '-') + '</td><td>交付日期</td><td>' + (r.deliveryDate || '-') + '</td></tr>' +
    '<tr><td>交付方式</td><td>' + (r.deliveryMethod || '-') + '</td><td>是否使用标识</td><td>' + (r.useLogo || '-') + '</td></tr>' +
    '<tr><td>检测内容</td><td colspan="3">' + r.testContent + '</td></tr>' +
    '<tr><td>标准依据</td><td colspan="3">' + r.standardBasis + '</td></tr>' +
    '<tr><td>其他要求</td><td colspan="3">' + (r.otherRequirements || '无') + '</td></tr>' +
    '<tr><td>最终结论</td><td colspan="3"><b>' + r.conclusion + '</b>　|　发起人：' + r.initiator + '</td></tr>' +
    '</table>' +

    '<h2 style="margin-top:24px">评审人记录</h2>' +
    reviewerHtml +

    '</body></html>'
  );
  setTimeout(function() { w.print(); w.close(); }, 400);
}

// ============================================================
// 删除评审（仅未提交状态）
// ============================================================
function deleteReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  if (r.status !== 'draft') { alert('仅可删除未提交的评审单'); return; }
  if (!confirm('确定删除评审单 ' + id + ' 吗？此操作不可恢复。')) return;
  REVIEWS = REVIEWS.filter(function(x) { return x.id !== id; });
  navTo('review');
  alert('已删除：' + id);
}

// ============================================================
// 重新发起评审（不通过后）
// ============================================================
function refireReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  if (r.status !== 'done' || r.conclusion !== '不通过') { alert('仅可重新发起不通过的评审'); return; }
  if (!confirm('确定基于 ' + id + ' 重新发起评审吗？将生成新评审编号。')) return;

  // 生成新编号（当天去重）
  var today = fmt(NOW);
  var baseId = 'TZJC/JSJL-HTPS' + today;
  var sameDay = REVIEWS.filter(function(x) { return x.id.indexOf(baseId) === 0; });
  var newId = sameDay.length === 0 ? baseId : baseId + '-' + (sameDay.length + 1);

  var newReview = {
    id: newId, proj: r.proj, client: r.client, contact: r.contact, phone: r.phone, ctype: r.ctype,
    testContent: r.testContent, standardBasis: r.standardBasis,
    contractAmount: r.contractAmount, deliveryDate: r.deliveryDate,
    deliveryMethod: r.deliveryMethod, useLogo: r.useLogo, otherRequirements: r.otherRequirements,
    domains: r.domains.slice(),
    reviewers: r.reviewers.map(function(rv) { return { name: rv.name, role: rv.role, result: '', items: {}, comment: '' }; }),
    conclusion: '评审中', date: fmt(NOW), initiator: LOGIN_USER, status: 'pending'
  };
  REVIEWS.push(newReview);
  navTo('review');
  alert('已重新发起评审！新编号：' + newId);
}

// ============================================================
// 初始化
// ============================================================
renderNav();
renderPage();
</script>
