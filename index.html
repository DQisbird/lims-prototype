.nav-parent.open+.nav-children{display:block}
.nav-child{padding:8px 20px 8px 36px;font-size:12px;cursor:pointer;transition:background .2s}
.nav-child:hover{background:#002140}
.nav-child.active{background:#1890ff;color:#fff}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 20px;font-size:14px;justify-content:space-between}

.content{flex:1;overflow-y:auto;padding:20px}

.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.toolbar input{width:160px}
.btn{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#1890ff;color:#fff}
.btn-success{background:#52c41a;color:#fff}
.btn-warning{background:#faad14;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0}

  var m = { '通过': 'green', '评审中': 'orange', '不通过': 'red', '未提交': 'default', '待处理': 'orange', '已处理': 'green', '进行中': 'green', '已完成': 'blue', '已终止': 'red', '草稿': 'default', '待审批': 'default', '审批中': 'blue', '已通过': 'green', '不通过': 'red' };
  return '<span class="tag tag-' + (m[s] || 'blue') + '">' + s + '</span>';
}

function showModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function makeForm(fields) {
  return fields.map(function(f) {
    var star = f.r ? '<span style="color:red">*</span>' : '';
    return '<div class="form-group"><label>' + (f.l || '') + star + '</label><div class="form-ctl">' + f.h + '</div></div>';
  }).join('');
}

function makeSelect(name, opts, val) {
  var h = '<select id="' + name + '">';
  opts.forEach(function(o) {
    h += '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>';
  });
  return h + '</select>';
}

// ============================================================
// 弹框多选组件（支持搜索）
// ============================================================
function multiSelectHtml(id, selected, options, placeholder) {
  var tags = '';
  selected.forEach(function(v) {
    var label = options[v] || v;
    tags += '<span class="ts-tag">' + label + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">' + (placeholder || '点击选择') + '</span>';
  return '<div class="tag-select" id="ts-' + id + '" onclick="multiSelectOpen(\'' + id + '\')">' + tags + '</div>';
}

function multiSelectOpen(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var optKeys = Object.keys(options);

  var rows = optKeys.map(function(k) {
    var checked = selected.indexOf(k) >= 0 ? ' checked' : '';
    return '<label class="ms-opt" data-v="' + k + '"><input type="checkbox"' + checked + '>' + options[k] + '</label>';
  }).join('');

  var body = '<input type="text" id="ms-search-' + id + '" placeholder="&#128269; 输入关键词搜索..." style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;margin-bottom:12px" oninput="multiSelectSearch(\'' + id + '\')">' +
    '<div class="ms-list" id="ms-list-' + id + '">' + rows + '</div>' +
    '<div style="margin-top:8px;color:#999;font-size:12px">已选 <b id="ms-count-' + id + '">' + selected.length + '</b> / ' + optKeys.length + ' 项</div>';

  var footer = '<button class="btn btn-default" onclick="closeModal()">取消</button>' +
    '<button class="btn btn-primary" onclick="multiSelectConfirm(\'' + id + '\')">确定</button>';

  showModal('选择', body, footer);
}

function multiSelectSearch(id) {
  var q = (document.getElementById('ms-search-' + id).value || '').toLowerCase();
  var items = document.getElementById('ms-list-' + id).querySelectorAll('.ms-opt');
  items.forEach(function(item) {
    item.style.display = item.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
}

function multiSelectConfirm(id) {
  var boxes = document.getElementById('ms-list-' + id).querySelectorAll('input[type="checkbox"]');
  var selected = [];
  boxes.forEach(function(cb) {
    if (cb.checked) selected.push(cb.closest('.ms-opt').getAttribute('data-v'));
  });

  var hidden = document.getElementById(id);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
  closeModal();
}

function multiSelectRefresh(id) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var options = JSON.parse(hidden.getAttribute('data-opts') || '{}');
  var tags = '';
  selected.forEach(function(v) {
    tags += '<span class="ts-tag">' + (options[v] || v) + '<span class="ts-close" onclick="event.stopPropagation();multiSelectRemove(\'' + id + '\',\'' + v + '\')">&times;</span></span>';
  });
  if (!tags) tags = '<span class="ts-placeholder">点击选择</span>';
  document.getElementById('ts-' + id).innerHTML = tags;
}

function multiSelectRemove(id, val) {
  var hidden = document.getElementById(id);
  var selected = JSON.parse(hidden.getAttribute('data-sel') || '[]');
  var idx = selected.indexOf(val);
  if (idx >= 0) selected.splice(idx, 1);
  hidden.setAttribute('data-sel', JSON.stringify(selected));
  multiSelectRefresh(id);
}

function getMultiSelectValues(id) {
  var hidden = document.getElementById(id);
  return JSON.parse(hidden.getAttribute('data-sel') || '[]');
}

    case 'commission': c.innerHTML = pageCommission(); break;

    case 'supervision': c.innerHTML = pageSupervision(); break;
    default: c.innerHTML = pagePlaceholder(TITLES[curPage] || curPage); break;
  }
}

  return '<div class="placeholder-card"><div class="ph-icon">&#128736;</div><div class="ph-text">' + title + ' 模块 — 待开发</div><div style="color:#bbb;font-size:12px;margin-top:8px">将在后续迭代中逐一实现</div></div>';

function pageTodo() {
  var todos = [];
  REVIEWS.forEach(function(r) {
    if (r.status === 'pending') {
      r.reviewers.forEach(function(rv) {
        if (rv.name === LOGIN_USER && !rv.result) {
          todos.push({ type: '合同评审', refId: r.id, project: r.proj, client: r.client, date: r.date, target: 'review', action: 'review' });
        }
      });
    }
  });
  // 委托审批工单
  DELEGATES.forEach(function(d) {
    if (d.status === '审批中' && d.approvers) {
      d.approvers.forEach(function(av) {
        if (av.name === LOGIN_USER && !av.result) {
          todos.push({ type: '委托审批', refId: d.id, project: d.objNameVer, client: d.client, date: d.createDate, target: 'approval', action: 'approval' });
        }
      });
    }
  });

  if (todos.length === 0) {
    return '<div class="card"><div class="card-title">待办工单</div><div style="text-align:center;padding:40px;color:#999;font-size:15px">&#127881; 暂无待办工单</div></div>';
  }

  var rows = todos.map(function(t) {
    var btnHtml = t.action === 'approval'
      ? '<button class="btn btn-primary btn-sm" onclick="viewApprovalWorksheet(\'' + t.refId + '\')">处理</button>'
      : '<button class="btn btn-primary btn-sm" onclick="viewReviewWorksheet(\'' + t.refId + '\')">处理</button>';
    return '<tr><td>' + t.type + '</td><td>' + t.project + '</td><td>' + t.client + '</td><td>' + t.date + '</td><td>' + t.refId + '</td>' +
      '<td>' + btnHtml + '</td></tr>';
  }).join('');

  return '<div class="card"><div class="card-title">待办工单</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
        '<select id="todo_filter_type" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">全部类型</option><option value="合同评审">合同评审</option><option value="委托审批">委托审批</option></select>' +
        '<input placeholder="项目名称" id="todo_filter_proj" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px">' +
        '<input placeholder="客户名称" id="todo_filter_client" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px">' +
        '<input placeholder="编号" id="todo_filter_id" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:160px">' +
        '<button class="btn btn-primary" onclick="filterTodos()" style="padding:6px 14px">🔍 查询</button>' +
      '</div>' +
      '<div style="color:#666;font-size:13px">当前登录：<b>' + LOGIN_USER + '</b>（质量负责人）&nbsp;|&nbsp;共 <b>' + todos.length + '</b> 条</div>' +
    '</div>' +
    '<table id="todoTable"><thead><tr>' +
      '<th>工单类型</th><th>项目名称</th><th>客户名称</th><th>分配日期</th><th>编号</th><th>操作</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

// ============================================================
// 已办工单
// ============================================================
function pageDone() {
  var doneList = [];
  REVIEWS.forEach(function(r) {
    if (r.status === 'done') {
      var isReviewer = r.reviewers.some(function(rv) { return rv.name === LOGIN_USER; });
      if (isReviewer) {
        var myRv = r.reviewers.filter(function(rv) { return rv.name === LOGIN_USER; })[0];
        doneList.push({ id: r.id, project: r.proj, client: r.client, date: r.date, conclusion: r.conclusion, processTime: myRv.processTime || r.date, type: '合同评审' });
      }
    }
  });
  // 委托审批已办
  DELEGATES.forEach(function(d) {
    if (d.approvers) {
      d.approvers.forEach(function(av) {
        if (av.name === LOGIN_USER && av.result) {
          doneList.push({ id: d.id, project: d.objNameVer, client: d.client, date: d.createDate, conclusion: av.result, processTime: av.processTime || d.createDate, type: '委托审批' });
        }
      });
    }
  });

  doneList.sort(function(a, b) { return (b.processTime || b.date).localeCompare(a.processTime || a.date); });

  if (doneList.length === 0) {
    return '<div class="card"><div class="card-title">已办工单</div><div style="text-align:center;padding:40px;color:#999;font-size:15px">暂无已办工单</div></div>';
  }

  var rows = doneList.map(function(d) {
    return '<tr><td>' + d.type + '</td><td>' + d.project + '</td><td>' + d.client + '</td><td>' + d.date + '</td><td>' + d.id + '</td>' +
      '<td>' + statusTag(d.conclusion) + '</td>' +
      '<td>' + (d.processTime || '-') + '</td>' +
      '<td>' + (d.type === '委托审批'
        ? '<button class="btn btn-default btn-sm" onclick="viewApprovalWorksheet(\'' + d.id + '\')">查看</button>'
        : '<button class="btn btn-default btn-sm" onclick="viewReviewWorksheet(\'' + d.id + '\')">查看</button>')
      + '</td></tr>';
  }).join('');

  return '<div class="card"><div class="card-title">已办工单</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
        '<select id="done_filter_type" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">全部类型</option><option value="合同评审">合同评审</option><option value="委托审批">委托审批</option></select>' +
        '<input placeholder="项目名称" id="done_filter_proj" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px">' +
        '<input placeholder="客户名称" id="done_filter_client" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px">' +
        '<input placeholder="编号" id="done_filter_id" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:160px">' +
        '<button class="btn btn-primary" onclick="filterDones()" style="padding:6px 14px">🔍 查询</button>' +
      '</div>' +
      '<div style="color:#666;font-size:13px">当前登录：<b>' + LOGIN_USER + '</b>（质量负责人）&nbsp;|&nbsp;共 <b>' + doneList.length + '</b> 条</div>' +
    '</div>' +
    '<table id="doneTable"><thead><tr>' +
      '<th>工单类型</th><th>项目名称</th><th>客户名称</th><th>日期</th><th>编号</th><th>结论</th><th>处理时间</th><th>操作</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function filterTodos() {
  var type = (document.getElementById('todo_filter_type') || {}).value || '';
  var proj = ((document.getElementById('todo_filter_proj') || {}).value || '').toLowerCase();
  var client = ((document.getElementById('todo_filter_client') || {}).value || '').toLowerCase();
  var id = ((document.getElementById('todo_filter_id') || {}).value || '').toLowerCase();
  var rows = document.querySelectorAll('#todoTable tbody tr');
  rows.forEach(function(row) {
    var tds = row.querySelectorAll('td');
    var show = true;
    if (type && tds[0].textContent !== type) show = false;
    if (proj && tds[1].textContent.toLowerCase().indexOf(proj) < 0) show = false;
    if (client && tds[2].textContent.toLowerCase().indexOf(client) < 0) show = false;
    if (id && tds[4].textContent.toLowerCase().indexOf(id) < 0) show = false;
    row.style.display = show ? '' : 'none';
  });
}

function reviewActionBtns(r) {
  var detailBtn = '<button class="btn btn-default btn-sm" onclick="viewReview(\'' + r.id + '\')">查看详情</button>';
  if (r.status === 'draft') return detailBtn + ' <button class="btn btn-default btn-sm" onclick="showReviewForm(\'' + r.id + '\')">编辑</button> <button class="btn btn-danger btn-sm" onclick="deleteReview(\'' + r.id + '\')">删除</button>';
  if (r.status === 'pending') return detailBtn + ' <button class="btn btn-primary btn-sm" onclick="viewReviewWorksheet(\'' + r.id + '\')">评审工单</button>';
  var btns = detailBtn + ' <button class="btn btn-primary btn-sm" onclick="viewReviewWorksheet(\'' + r.id + '\')">评审工单</button> <button class="btn btn-default btn-sm" onclick="printReview(\'' + r.id + '\')">&#128424; 打印</button>';
  if (r.conclusion === '不通过') btns += ' <button class="btn btn-warning btn-sm" onclick="refireReview(\'' + r.id + '\')">重新发起</button>';
  return btns;
}

function reviewTableRows(data) {
  return data.map(function(r) {
    return '<tr><td>' + r.id + '</td>' +
      '<td>' + r.proj + '</td><td>' + r.client + '</td><td>' + r.ctype + '</td>' +
      '<td>' + r.domains.map(function(d) { return DOMAIN_LABELS[d] + '(' + d + ')'; }).join('、') + '</td><td>' + statusTag(r.conclusion) + '</td>' +
      '<td>' + r.date + '</td><td>' + r.initiator + '</td><td>' + reviewActionBtns(r) + '</td></tr>';
  }).join('');

function reviewToolbar() {
  return '<div class="toolbar">' +
    '<input placeholder="评审编号" id="rf_filter_id">' +
    '<input placeholder="项目名称" id="rf_filter_proj">' +
    '<input placeholder="客户名称" id="rf_filter_client">' +

function reviewPagination() {
  var total = Math.ceil(reviewFilteredData.length / reviewPageSize);
  if (total <= 1) return '';
  var html = '<div style="display:flex;justify-content:center;align-items:center;gap:6px;margin-top:16px;font-size:13px;flex-wrap:wrap">';
  if (reviewPage > 1) html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + (reviewPage - 1) + ')">上一页</button>';
  var start = Math.max(1, reviewPage - 3), end = Math.min(total, reviewPage + 3);
  if (start > 1) { html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(1)">1</button>'; if (start > 2) html += '<span style="color:#999">…</span>'; }
  for (var i = start; i <= end; i++) {
    html += '<button class="btn btn-sm" style="' + (i === reviewPage ? 'background:#1890ff;color:#fff' : 'background:#fff;color:#333;border:1px solid #d9d9d9') + '" onclick="goReviewPage(' + i + ')">' + i + '</button>';
  }
  if (end < total) { if (end < total - 1) html += '<span style="color:#999">…</span>'; html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + total + ')">' + total + '</button>'; }
  if (reviewPage < total) html += '<button class="btn btn-default btn-sm" onclick="goReviewPage(' + (reviewPage + 1) + ')">下一页</button>';
  html += '<span style="color:#999;margin-left:8px">第' + reviewPage + '页/共' + total + '页（' + reviewFilteredData.length + '条）</span></div>';
  return html;
}

function renderReviewList() {
  var total = reviewFilteredData.length;
  var start = (reviewPage - 1) * reviewPageSize;
  var pageData = reviewFilteredData.slice(start, start + reviewPageSize);
  var emptyRow = total === 0 ? '<tr><td colspan="9" style="text-align:center;color:#999;padding:40px">暂无数据</td></tr>' : '';
  return '<div class="card"><div class="card-title">合同评审</div>' +
    reviewToolbar() +
    '<table><thead><tr><th>评审编号</th><th>项目名称</th><th>客户名称</th><th>合同类型</th><th>拟检测领域</th><th>评审结论</th><th>评审日期</th><th>发起人</th><th>操作</th></tr></thead>' +
    '<tbody>' + (emptyRow || reviewTableRows(pageData)) + '</tbody></table>' +
    reviewPagination() + '</div>';
}

function goReviewPage(n) { reviewPage = n; document.getElementById('content').innerHTML = renderReviewList(); }

function pageReview() {
  reviewFilteredData = REVIEWS;
  reviewPage = 1;
  return renderReviewList();
}

function filterReviews() {
  var id = (document.getElementById('rf_filter_id').value || '').toLowerCase();
  var proj = (document.getElementById('rf_filter_proj').value || '').toLowerCase();
  var client = (document.getElementById('rf_filter_client').value || '').toLowerCase();
  var conclusion = document.getElementById('rf_filter_conclusion').value;
  reviewFilteredData = REVIEWS.filter(function(r) {
    if (id && r.id.toLowerCase().indexOf(id) < 0) return false;
    if (proj && r.proj.toLowerCase().indexOf(proj) < 0) return false;
    if (client && r.client.toLowerCase().indexOf(client) < 0) return false;
    if (conclusion && r.conclusion !== conclusion) return false;
    return true;
  });
  reviewPage = 1;
  document.getElementById('content').innerHTML = renderReviewList();
}

// ============================================================
function showReviewForm(editId) {
  var editR = null;
  if (editId) { editR = REVIEWS.filter(function(x) { return x.id === editId; })[0]; }
  var dOpts = {};
  DOMAINS.forEach(function(d) { dOpts[d] = DOMAIN_LABELS[d] + ' (' + d + ')'; });
  var pOpts = {};
  PERSONNEL.forEach(function(p) { pOpts[p.name + ' (' + p.role + ')'] = p.name + ' (' + p.role + ')'; });

  // 生成默认编号（当天去重）
  var today = fmt(NOW);
  var basePrefix = 'TZJC/JSJL-' + today + '.HTPS-';
  var sameDay = REVIEWS.filter(function(r) { return r.id.indexOf(basePrefix) === 0; });
  var defaultId = basePrefix + (sameDay.length + 1);

  // 编辑时使用已有数据
  var init = editR || {};
  var selDomains = init.domains || [];
  var selReviewers = (init.reviewers || []).map(function(rv) { return rv.name + ' (' + rv.role + ')'; });

  var dTags = multiSelectHtml('rf_domains', selDomains, dOpts, '点击选择检测领域');
  var pTags = multiSelectHtml('rf_reviewers', selReviewers, pOpts, '点击选择评审人员');

  var body = makeForm([
    { l: '评审编号', r: 1, h: '<input id="rf_id" value="' + (editR ? editR.id : defaultId) + '" placeholder="TZJC/JSJL-{YYYY-MM-DD}.HTPS-1"' + (editR ? '' : '') + '>' },
    { l: '项目名称', r: 1, h: '<input id="rf_proj" value="' + (init.proj || '') + '" placeholder="请输入项目名称">' },
    { l: '客户名称', r: 1, h: '<input id="rf_client" value="' + (init.client || '') + '" placeholder="请输入客户名称">' },
    { l: '联系人', r: 1, h: '<input id="rf_contact" value="' + (init.contact || '') + '" placeholder="请输入联系人">' },
    { l: '联系方式', r: 1, h: '<input id="rf_phone" value="' + (init.phone || '') + '" placeholder="请输入联系方式">' },
    { l: '合同类型', r: 1, h: makeSelect('rf_ctype', ['框架合同', '年度合同', '单次合同'], init.ctype || '') },
    { l: '检测内容', r: 1, h: '<textarea id="rf_content" rows="3" placeholder="请输入检测内容描述">' + (init.testContent || '') + '</textarea>' },

function collectReviewForm() {
  var rid = (document.getElementById('rf_id').value || '').trim();
  var p = (document.getElementById('rf_proj').value || '').trim();
  var cl = (document.getElementById('rf_client').value || '').trim();
  var ct = (document.getElementById('rf_contact').value || '').trim();
  var ph = (document.getElementById('rf_phone').value || '').trim();
  var content = (document.getElementById('rf_content').value || '').trim();
  var standard = (document.getElementById('rf_standard').value || '').trim();
  var ctype = document.getElementById('rf_ctype').value;
  var domains = JSON.parse(document.getElementById('rf_domains').getAttribute('data-sel') || '[]');
  var reviewersRaw = JSON.parse(document.getElementById('rf_reviewers').getAttribute('data-sel') || '[]');
  var reviewers = reviewersRaw.map(function(r) {
    var m = r.match(/^(.+?) \((.+?)\)$/);
    return { name: m[1], role: m[2], result: '', items: {}, comment: '' };
  });
  return {
    id: rid, proj: p, client: cl, contact: ct, phone: ph, ctype: ctype,
    testContent: content, standardBasis: standard,
    contractAmount: parseFloat(document.getElementById('rf_amount').value) || 0,
    deliveryDate: document.getElementById('rf_deliveryDate').value,
    deliveryMethod: document.getElementById('rf_deliveryMethod').value,
    useLogo: document.getElementById('rf_useLogo').value,
    otherRequirements: document.getElementById('rf_other').value,
    domains: domains, reviewers: reviewers
  };
}

// 保存草稿（状态=未提交）
function saveReviewDraft(editId) {
  var data = collectReviewForm();
  if (!data.id) { alert('请输入评审编号'); return; }
  if (!data.proj || !data.client) { alert('请至少填写项目名称和客户名称'); return; }

  if (editId) {
    // 编辑模式：更新已有记录
    var idx = -1;
    REVIEWS.forEach(function(r, i) { if (r.id === editId) idx = i; });
    if (idx >= 0) {
      data.conclusion = '未提交'; data.date = REVIEWS[idx].date; data.initiator = REVIEWS[idx].initiator; data.status = 'draft';
      REVIEWS[idx] = data;
    }
    closeModal(); navTo('review');
    alert('已保存（未提交）');
  } else {
    // 新增
    var dup = REVIEWS.filter(function(r) { return r.id === data.id; });
    if (dup.length > 0) { alert('评审编号已存在：' + data.id); return; }
    data.conclusion = '未提交'; data.date = fmt(NOW); data.initiator = LOGIN_USER; data.status = 'draft';
    REVIEWS.push(data);
    closeModal(); navTo('review');
    alert('已保存（未提交），编号：' + data.id);
  }
}

// 提交评审（状态=评审中）
function submitNewReview(editId) {
  var data = collectReviewForm();
  if (!data.id) { alert('请输入评审编号'); return; }
  if (!data.proj || !data.client || !data.contact || !data.phone || !data.testContent || !data.standardBasis) { alert('请填写所有必填字段'); return; }
  if (data.domains.length === 0) { alert('请选择至少一个检测领域'); return; }
  if (data.reviewers.length === 0) { alert('请选择评审人员'); return; }

  var hasZL = data.reviewers.some(function(rv) { return rv.role.indexOf('质量负责人') >= 0; });
  var hasBM = data.reviewers.some(function(rv) { return rv.role.indexOf('部门负责人') >= 0; });
  if (!hasZL || !hasBM) { alert('评审人员必须包含质量负责人和部门负责人'); return; }

  if (editId) {
    // 编辑模式：更新已有记录并提交
    var idx = -1;
    REVIEWS.forEach(function(r, i) { if (r.id === editId) idx = i; });
    if (idx >= 0) {
      data.conclusion = '评审中'; data.date = fmt(NOW); data.initiator = REVIEWS[idx].initiator; data.status = 'pending';
      // 保留已填写的评审数据
      data.reviewers = REVIEWS[idx].reviewers;
      REVIEWS[idx] = data;
    }
    closeModal(); navTo('review');
    alert('已提交评审！');
  } else {
    // 新增
    var dup = REVIEWS.filter(function(r) { return r.id === data.id; });
    if (dup.length > 0) { alert('评审编号已存在：' + data.id + '，请修改'); return; }
    data.conclusion = '评审中'; data.date = fmt(NOW); data.initiator = LOGIN_USER; data.status = 'pending';
    REVIEWS.push(data);
    closeModal(); navTo('review');
    alert('评审已发起！编号：' + data.id);
  }
}

function viewReviewWorksheet(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  document.querySelector('.modal').classList.add('modal-wide');

  var leftHtml = '<div class="ws-left">' + reviewDetailTable(r) + '</div>';
  var rightHtml;

  if (r.status === 'done') {
    var tables = r.reviewers.map(function(rv) {
      var rows = ITEM_KEYS.map(function(k) {
        return '<tr><td>' + ITEM_LABELS[k] + '</td><td>' + (rv.items[k] || '-') + '</td></tr>';
      }).join('');
      return '<div style="margin-bottom:12px;border:1px solid #f0f0f0;border-radius:6px;overflow:hidden">' +
        '<div style="padding:6px 10px;background:#fafafa;font-weight:bold;font-size:13px">' + rv.name + '（' + rv.role + '）— ' + statusTag(rv.result || '未填写') +
        (rv.comment ? ' <span style="color:#999;font-weight:normal;font-size:11px">' + rv.comment + '</span>' : '') + '</div>' +
        '<table class="review-items-table">' + rows + '</table></div>';
    }).join('');
    rightHtml = '<div class="ws-right"><div class="ws-right-title">评审明细（已完成）</div>' + tables + '</div>';
  } else {
    var rows = r.reviewers.map(function(rv, i) {
      var filled = rv.result ? true : false;
      var isMe = rv.name === LOGIN_USER;
      var btnHtml = isMe
        ? '<button class="btn btn-primary btn-sm" onclick="fillReviewWorksheet(\'' + id + '\',' + i + ')">' + (filled ? '修改' : '填写') + '</button>'
        : (filled ? statusTag(rv.result) : '<span style="color:#bbb;font-size:11px">等待填写</span>');
      return '<tr><td>' + rv.name + '</td><td>' + rv.role + '</td>' +
        '<td>' + (filled ? statusTag(rv.result) : '<span style="color:#999">未填写</span>') + '</td>' +
        '<td>' + btnHtml + '</td></tr>';
    }).join('');
    rightHtml = '<div class="ws-right"><div class="ws-right-title">评审人员填写进度</div>' +
      '<table><thead><tr><th>评审人</th><th>角色</th><th>结论</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="margin-top:16px;text-align:center"><button class="btn btn-warning" onclick="finalizeReview(\'' + id + '\')">汇总评审结论</button></div>' +
      '</div>';

function fillReviewWorksheet(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];
  if (rv.name !== LOGIN_USER) { alert('只能填写自己的评审意见'); return; }
  document.querySelector('.modal').classList.add('modal-wide');

  var itemFields = ITEM_KEYS.map(function(k) {
    return { l: ITEM_LABELS[k], r: 1, h: makeSelect('rwi_' + k, ['是', '否'], rv.items[k] || '') };
  });

  var leftHtml = '<div class="ws-left">' + reviewDetailTable(r) + '</div>';
  var formHtml = makeForm(itemFields.concat([
    { l: '评审结论', r: 1, h: makeSelect('rwi_conclusion', ['通过', '不通过'], rv.result || '') },
    { l: '不通过原因', h: '<textarea id="rwi_comment" rows="2" placeholder="不通过时请填写原因">' + (rv.comment || '') + '</textarea>' }
  ]));
  var rightHtml = '<div class="ws-right"><div class="ws-right-title">填写评审 — ' + rv.name + '（' + rv.role + '）</div>' + formHtml + '</div>';

  var footer = '<button class="btn btn-primary" onclick="submitReviewItem(\'' + id + '\',' + idx + ')">保存</button>';
  showModal('填写评审工单 — ' + rv.name, '<div class="ws-layout">' + leftHtml + rightHtml + '</div>', footer);
  setTimeout(function() { document.querySelector('.modal').classList.remove('modal-wide'); }, 100);
}

function submitReviewItem(id, idx) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  var rv = r.reviewers[idx];
  var conclusion = document.getElementById('rwi_conclusion').value;
  var comment = (document.getElementById('rwi_comment').value || '').trim();

  if (conclusion === '不通过' && !comment) {
    alert('不通过时必须填写不通过原因');
    return;
  }

  rv.result = conclusion;
  rv.comment = comment;
  ITEM_KEYS.forEach(function(k) {
    rv.items[k] = document.getElementById('rwi_' + k).value;
  });

  closeModal();
  viewReviewWorksheet(id);
  renderNav();
  alert(rv.name + ' 评审工单已保存');
}

function finalizeReview(id) {
  // 只有质量负责人才能汇总评审结论
  if (LOGIN_USER !== '张工') { alert('仅质量负责人可汇总评审结论'); return; }
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  // Check all reviewers have filled
  var unfilled = r.reviewers.filter(function(rv) { return !rv.result; });
  if (unfilled.length > 0) {
    var names = unfilled.map(function(rv) { return rv.name; }).join('、');
    alert('以下评审人尚未填写：' + names);
    return;
  }

  var allPass = r.reviewers.every(function(rv) { return rv.result === '通过'; });
  if (allPass) {
    r.conclusion = '通过';
    r.status = 'done';
    closeModal();
    navTo('review');
    alert('全员通过！评审已通过，可进入合同签订阶段。');
  } else {
    r.conclusion = '不通过';
    r.status = 'done';
    var failNames = r.reviewers.filter(function(rv) { return rv.result === '不通过'; }).map(function(rv) { return rv.name; }).join('、');
    closeModal();
    navTo('review');
    alert('评审不通过！不通过人员：' + failNames + '。流程终止。');
  }
}

    '<table>' +
    '<tr><td width="100">项目名称</td><td>' + r.proj + '</td><td width="100">客户名称</td><td>' + r.client + '</td></tr>' +
    '<tr><td>联系人</td><td>' + r.contact + '</td><td>联系方式</td><td>' + r.phone + '</td></tr>' +
    '<tr><td>合同类型</td><td>' + r.ctype + '</td><td>检测领域</td><td>' + domainStr + '</td></tr>' +
    '<tr><td>合同金额</td><td>' + (r.contractAmount ? (r.contractAmount >= 10000 ? (r.contractAmount/10000).toFixed(1) + '万元' : r.contractAmount + '元') : '-') + '</td><td>交付日期</td><td>' + (r.deliveryDate || '-') + '</td></tr>' +
    '<tr><td>交付方式</td><td>' + (r.deliveryMethod || '-') + '</td><td>是否使用标识</td><td>' + (r.useLogo || '-') + '</td></tr>' +
    '<tr><td>检测内容</td><td colspan="3">' + r.testContent + '</td></tr>' +
    '<tr><td>标准依据</td><td colspan="3">' + r.standardBasis + '</td></tr>' +
    '<tr><td>其他要求</td><td colspan="3">' + (r.otherRequirements || '无') + '</td></tr>' +
    '<tr><td>最终结论</td><td colspan="3"><b>' + r.conclusion + '</b>　|　发起人：' + r.initiator + '</td></tr>' +
    '</table>' +

    '<h2 style="margin-top:24px">评审人记录</h2>' +

    '</body></html>'
  );

}

// ============================================================
// 删除评审（仅未提交状态）
// ============================================================
function deleteReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  if (r.status !== 'draft') { alert('仅可删除未提交的评审单'); return; }
  if (!confirm('确定删除评审单 ' + id + ' 吗？此操作不可恢复。')) return;
  REVIEWS = REVIEWS.filter(function(x) { return x.id !== id; });
  navTo('review');
  alert('已删除：' + id);
}

// ============================================================
// 重新发起评审（不通过后）
// ============================================================
function refireReview(id) {
  var r = REVIEWS.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  if (r.status !== 'done' || r.conclusion !== '不通过') { alert('仅可重新发起不通过的评审'); return; }
  if (!confirm('确定基于 ' + id + ' 重新发起评审吗？将生成新评审编号。')) return;

  // 生成新编号（当天去重）
  var today = fmt(NOW);
  var basePrefix = 'TZJC/JSJL-' + today + '.HTPS-';
  var sameDay = REVIEWS.filter(function(x) { return x.id.indexOf(basePrefix) === 0; });
  var newId = basePrefix + (sameDay.length + 1);

  var newReview = {
    id: newId, proj: r.proj, client: r.client, contact: r.contact, phone: r.phone, ctype: r.ctype,
    testContent: r.testContent, standardBasis: r.standardBasis,
    contractAmount: r.contractAmount, deliveryDate: r.deliveryDate,
    deliveryMethod: r.deliveryMethod, useLogo: r.useLogo, otherRequirements: r.otherRequirements,
    domains: r.domains.slice(),
    reviewers: r.reviewers.map(function(rv) { return { name: rv.name, role: rv.role, result: '', items: {}, comment: '' }; }),
    conclusion: '评审中', date: fmt(NOW), initiator: LOGIN_USER, status: 'pending'
  };
  REVIEWS.push(newReview);
  navTo('review');
  alert('已重新发起评审！新编号：' + newId);
}

function pageContract() {
  var idFilter = (document.getElementById('ct_filter_id') || {}).value || '';
  var nameFilter = (document.getElementById('ct_filter_name') || {}).value || '';
  var clientFilter = (document.getElementById('ct_filter_client') || {}).value || '';
  var statusFilter = (document.getElementById('ct_filter_status') || {}).value || '';
  var fromFilter = (document.getElementById('ct_filter_from') || {}).value || '';
  var toFilter = (document.getElementById('ct_filter_to') || {}).value || '';

  var list = CONTRACTS.slice();
  if (idFilter) { var q = idFilter.toLowerCase(); list = list.filter(function(c) { return c.id.toLowerCase().indexOf(q) >= 0; }); }
  if (nameFilter) { var q = nameFilter.toLowerCase(); list = list.filter(function(c) { return c.name.toLowerCase().indexOf(q) >= 0; }); }
  if (clientFilter) { var q = clientFilter.toLowerCase(); list = list.filter(function(c) { return c.client.toLowerCase().indexOf(q) >= 0; }); }
  if (statusFilter) { list = list.filter(function(c) { return c.status === statusFilter; }); }
  if (fromFilter) { list = list.filter(function(c) { return c.signDate >= fromFilter; }); }
  if (toFilter) { list = list.filter(function(c) { return c.signDate <= toFilter; }); }

  var rows = list.map(function(c) {
    var btns = '<button class="btn btn-default btn-sm" onclick="viewContract(\'' + c.id + '\')">查看详情</button> ';
    if (c.status === '草稿') {
      btns += '<button class="btn btn-primary btn-sm" onclick="editContract(\'' + c.id + '\')">编辑</button> ' +
              '<button class="btn btn-sm" style="background:#52c41a;color:#fff" onclick="signContract(\'' + c.id + '\')">签订生效</button>';
    } else if (c.status === '进行中' || c.status === '已完成') {
      btns += '<button class="btn btn-sm" style="background:#ff4d4f;color:#fff" onclick="terminateContract(\'' + c.id + '\')">终止</button>';
    }
    return '<tr>' +
      '<td>' + c.id + '</td><td>' + c.name + '</td><td>' + c.client + '</td>' +
      '<td>' + c.reviewId + '</td><td>' + (c.signDate || '-') + '</td>' +
      '<td>' + (c.servicePeriod || '-') + '</td>' +
      '<td>' + statusTag(c.status) + '</td><td>' + c.delegateCount + '</td>' +
      '<td>' + btns + '</td></tr>';
  }).join('');

  return '<div class="card">' +
    '<div class="card-title">合同列表</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
        '<input placeholder="合同编号" id="ct_filter_id" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:160px" value="' + (idFilter || '') + '">' +
        '<input placeholder="合同名称" id="ct_filter_name" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px" value="' + (nameFilter || '') + '">' +
        '<input placeholder="客户名称" id="ct_filter_client" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:140px" value="' + (clientFilter || '') + '">' +
        '<select id="ct_filter_status" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">全部状态</option><option value="草稿"' + (statusFilter==='草稿'?' selected':'') + '>草稿</option><option value="进行中"' + (statusFilter==='进行中'?' selected':'') + '>进行中</option><option value="已完成"' + (statusFilter==='已完成'?' selected':'') + '>已完成</option><option value="已终止"' + (statusFilter==='已终止'?' selected':'') + '>已终止</option></select>' +
        '<input type="date" id="ct_filter_from" style="padding:6px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:130px" value="' + (fromFilter || '') + '" title="签订日期从">' +
        '<span style="color:#999">-</span>' +
        '<input type="date" id="ct_filter_to" style="padding:6px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:130px" value="' + (toFilter || '') + '" title="签订日期至">' +
        '<button class="btn btn-primary" onclick="navTo(\'contract\')" style="padding:6px 14px">🔍 查询</button>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="showContractCreate()">+ 新建合同</button>' +
    '</div>' +
    (list.length === 0 ? '<div style="text-align:center;padding:40px;color:#999;font-size:14px">暂无匹配的合同记录</div>' :
    '<table><thead><tr>' +
      '<th>合同编号</th><th>合同名称</th><th>客户名称</th><th>关联评审</th><th>签订日期</th><th>服务期限</th><th>合同状态</th><th>关联委托数</th><th>操作</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>') +
    '</div>';
}

function onCtReviewChange() {
  var rid = document.getElementById('ctReview').value;
  if (!rid) {
    document.getElementById('ctClient').value = '';
    document.getElementById('ctName').value = '';
    document.getElementById('ctAmount').value = '';
    document.getElementById('ctPeriod').value = fmt(NOW);
    document.getElementById('ctSummary').value = '';
    return;
  }
  var r = REVIEWS.filter(function(x) { return x.id === rid; })[0];
  if (r) {
    document.getElementById('ctClient').value = r.client;
    document.getElementById('ctName').value = r.proj + '检测合同';
    document.getElementById('ctAmount').value = r.contractAmount || '';
    document.getElementById('ctPeriod').value = r.deliveryDate || '';
    document.getElementById('ctSummary').value = r.testContent || '';
    // 合同编号后缀自动建议：评审日期
    if (r.date) { document.getElementById('ctIdTail').value = r.date; }
  }
}

function saveContract() {
  var reviewId = document.getElementById('ctReview').value;
  var tail = document.getElementById('ctIdTail').value.trim();
  var name = document.getElementById('ctName').value.trim();
  var client = document.getElementById('ctClient').value.trim();
  if (!reviewId) { alert('请选择关联评审'); return; }
  if (!tail) { alert('请输入合同编号后缀'); return; }
  var id = 'TZJC-JCHT-' + tail;
  if (!name) { alert('请输入合同名称'); return; }
  if (!client) { alert('客户名称未获取到，请确认关联评审'); return; }

  if (CONTRACTS.some(function(c) { return c.id === id; })) { alert('合同编号 ' + id + ' 已存在，请修改后缀'); return; }

  var r = REVIEWS.filter(function(x) { return x.id === reviewId; })[0];
  var ctFile = document.getElementById('ctFile');
  var fileName = (ctFile && ctFile.files && ctFile.files[0]) ? ctFile.files[0].name : '';
  CONTRACTS.push({
    id: id, name: name, client: client, reviewId: reviewId, reviewProj: r.proj,
    amount: parseFloat(document.getElementById('ctAmount').value) || 0,
    signDate: document.getElementById('ctSignDate').value,
    servicePeriod: document.getElementById('ctPeriod').value.trim(),
    summary: document.getElementById('ctSummary').value.trim(),
    contractFileName: fileName,
    status: '草稿', delegateCount: 0, delegates: []
  });
  closeModal(); navTo('contract');
  alert('合同 ' + id + ' 已创建（草稿）');
}

    '<tr><td>合同编号 <span style="color:red">*</span></td><td style="display:flex;align-items:center;gap:0">' +

      '<input id="ctIdTail" type="text" style="flex:1;padding:6px;border:1px solid #d9d9d9;border-radius:0 4px 4px 0;font-size:13px" value="' + tail + '">' +
    '</td></tr>' +

    '<tr><td>合同金额（元）</td><td><input id="ctAmount" type="number" style="width:100%;padding:6px" value="' + (c.amount || '') + '"></td></tr>' +
    '<tr><td>签订日期</td><td><input id="ctSignDate" type="date" style="width:100%;padding:6px" value="' + (c.signDate || '') + '"></td></tr>' +

    '<tr><td>合同附件</td><td><input type="file" id="ctFile" style="padding:6px">' + (c.contractFileName ? '<br><small style="color:#1890ff">📎 当前附件：' + c.contractFileName + '</small>' : '') + '</td></tr>' +

  showModal('编辑合同 - ' + c.id, body,
    '<button class="btn btn-default" onclick="closeModal()">取消</button>' +
    '<button class="btn btn-primary" onclick="saveEditContract(\'' + cid + '\')">保存</button>'
  );
}

function saveEditContract(cid) {
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (!c) return;
  var tail = document.getElementById('ctIdTail').value.trim();
  if (!tail) { alert('请输入合同编号后缀'); return; }
  var newId = 'TZJC-JCHT-' + tail;
  if (newId !== cid && CONTRACTS.some(function(x) { return x.id === newId; })) { alert('合同编号 ' + newId + ' 已存在'); return; }
  c.id = newId;
  c.name = document.getElementById('ctName').value.trim();
  c.amount = parseFloat(document.getElementById('ctAmount').value) || 0;
  c.signDate = document.getElementById('ctSignDate').value;
  c.servicePeriod = document.getElementById('ctPeriod').value.trim();
  c.summary = document.getElementById('ctSummary').value.trim();
  var ctFile = document.getElementById('ctFile');
  if (ctFile && ctFile.files && ctFile.files[0]) { c.contractFileName = ctFile.files[0].name; }
  if (!c.name) { alert('请输入合同名称'); return; }
  closeModal(); navTo('contract');
  alert('合同 ' + cid + ' 已更新');
}

function signContract(cid) {
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (!c) return;
  if (c.status !== '草稿') { alert('仅可签订草稿状态的合同'); return; }
  if (!c.signDate) { alert('请先编辑合同并填写签订日期'); return; }
  if (!confirm('确定将合同 ' + c.id + ' 签订生效吗？')) return;
  c.status = '进行中';
  navTo('contract');
  alert('合同 ' + c.id + ' 已生效，状态：进行中');
}

function terminateContract(cid) {
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (!c) return;
  if (c.status !== '进行中' && c.status !== '已完成') { alert('仅可终止进行中或已完成的合同'); return; }
  if (!confirm('确定终止合同 ' + c.id + ' 吗？终止后不可恢复。')) return;
  c.status = '已终止';
  navTo('contract');
  alert('合同 ' + c.id + ' 已终止');
}

        : '0（暂无关联委托）') +

    '<table class="ws-form-table">' + rows + '</table>',
    '<button class="btn btn-default" onclick="closeModal()">关闭</button>'
  );

function viewContractDelegates(cid) {
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (!c) return;

  if (c.delegateCount === 0) {
    alert('该合同暂无关联委托');
    return;
  }

  var delegates = (typeof DELEGATES !== 'undefined') ? DELEGATES.filter(function(d) { return d.contractId === cid; }) : [];
  if (delegates.length === 0) {
    alert('该合同暂无关联委托记录');
    return;
  }

  var rows = delegates.map(function(d) {
    return '<tr>' +
      '<td>' + d.id + '</td><td>' + d.client + '</td>' +
      '<td>' + d.objNameVer + '</td><td>' + d.domains.map(function(dm) { return DOMAIN_LABELS[dm] || dm; }).join('、') + '</td>' +
      '<td>' + statusTag(d.status) + '</td><td>' + (d.createDate || '-') + '</td>' +
      '</tr>';
  }).join('');

  showModal('合同 ' + cid + ' 关联委托列表',
    '<table style="width:100%;border-collapse:collapse"><thead><tr>' +
      '<th>委托编号</th><th>委托方</th><th>检测对象名称及版本</th><th>检测领域</th><th>状态</th><th>创建日期</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>',
    '<button class="btn btn-default" onclick="closeModal()">关闭</button>'
  );
}
// ============================================================
// 1.3 委托创建
// ============================================================
var commPage = 1, commPageSize = 5, commFilteredData = [];

function pageCommission() {
  commFilteredData = DELEGATES;
  commPage = 1;
  return renderCommissionList();
}

function renderCommissionList() {
  var start = (commPage - 1) * commPageSize;
  var end = Math.min(start + commPageSize, commFilteredData.length);
  var list = commFilteredData.slice(start, end);
  var totalPages = Math.ceil(commFilteredData.length / commPageSize);

  var rows = list.map(function(d) {
    var domainLabels = d.domains.map(function(dm) { return DOMAIN_LABELS[dm] || dm; }).join('、');
    var c = CONTRACTS.filter(function(x) { return x.id === d.contractId; })[0];
    var contractDisplay = c ? c.id : '独立委托';
    var ops = '';
    var detailBtn = '<button class="btn btn-default btn-sm" onclick="viewCommissionDetail(\'' + d.id + '\')">查看详情</button>';
    if (d.status === '待审批') {
      ops = '<button class="btn btn-primary btn-sm" onclick="showCommissionForm(\'' + d.id + '\')">编辑</button> ' +
            '<button class="btn btn-success btn-sm" onclick="submitCommission(\'' + d.id + '\')">提交审批</button> ' +
            '<button class="btn btn-danger btn-sm" onclick="deleteCommission(\'' + d.id + '\')">删除</button> ' + detailBtn;
    } else if (d.status === '审批中') {
      ops = '<button class="btn btn-primary btn-sm" onclick="viewApprovalWorksheet(\'' + d.id + '\')">查看审批进度</button> ' + detailBtn;
    } else if (d.status === '已通过') {
      ops = '<span style="color:#52c41a;font-size:12px">✓已通过</span> ' + detailBtn;
    } else if (d.status === '不通过') {
      ops = '<button class="btn btn-primary btn-sm" onclick="viewApprovalWorksheet(\'' + d.id + '\')">查看审批进度</button> ' +
            '<button class="btn btn-warning btn-sm" onclick="refireCommission(\'' + d.id + '\')">重新发起</button> ' + detailBtn;
    }
    return '<tr>' +
      '<td>' + d.id + '</td><td>' + d.client + '</td><td>' + contractDisplay + '</td>' +
      '<td>' + d.objNameVer + '</td><td>' + domainLabels + '</td>' +
      '<td>' + (d.deadline || '-') + '</td>' +
      '<td>' + statusTag(d.status) + '</td><td>' + (d.createDate || '-') + '</td>' +
      '<td>' + ops + '</td></tr>';
  }).join('');

  var pagination = '';
  if (totalPages > 1) {
    var pBtns = '';
    for (var i = 1; i <= totalPages; i++) {
      pBtns += '<button class="btn ' + (i === commPage ? 'btn-primary' : 'btn-default') + ' btn-sm" onclick="commPage=' + i + ';document.getElementById(\'content\').innerHTML=renderCommissionList()">' + i + '</button>';
    }
    pagination = '<div style="margin-top:12px;display:flex;gap:6px;align-items:center;font-size:13px;color:#666">' +
      '<button class="btn btn-default btn-sm" ' + (commPage <= 1 ? 'disabled' : 'onclick="commPage--;document.getElementById(\'content\').innerHTML=renderCommissionList()"') + '>上一页</button>' +
      pBtns +
      '<button class="btn btn-default btn-sm" ' + (commPage >= totalPages ? 'disabled' : 'onclick="commPage++;document.getElementById(\'content\').innerHTML=renderCommissionList()"') + '>下一页</button>' +
      '<span style="margin-left:12px">第' + commPage + '页/共' + totalPages + '页（' + commFilteredData.length + '条）</span></div>';
  }

  return '<div class="card"><div class="card-title">委托列表</div>' +
    filterBarCommission() +
    '<table><thead><tr>' +
    '<th>委托编号</th><th>委托方名称</th><th>关联合同</th><th>检测对象名称及版本</th><th>检测领域</th><th>要求完成时间</th><th>委托状态</th><th>创建时间</th><th>操作</th>' +
    '</tr></thead><tbody>' + (list.length ? rows : '<tr><td colspan="9" style="text-align:center;color:#999;padding:30px">暂无委托记录</td></tr>') + '</tbody></table>' +
    pagination + '</div>';
}

function filterBarCommission() {
  return '<div class="toolbar">' +
    '<input id="cf_id" placeholder="委托编号" oninput="filterCommissions()">' +
    '<input id="cf_client" placeholder="委托方名称" oninput="filterCommissions()">' +
    '<select id="cf_domain" onchange="filterCommissions()"><option value="">检测领域-全部</option>' +
      DOMAINS.map(function(d) { return '<option value="' + d + '">' + DOMAIN_LABELS[d] + ' (' + d + ')</option>'; }).join('') +
    '</select>' +
    '<select id="cf_status" onchange="filterCommissions()"><option value="">委托状态-全部</option><option value="待审批">待审批</option><option value="审批中">审批中</option><option value="已通过">已通过</option><option value="不通过">不通过</option></select>' +
    '<input type="date" id="cf_date_from" onchange="filterCommissions()" style="padding:6px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:130px" title="创建时间从">' +
    '<span style="color:#999;margin:0 4px">~</span>' +
    '<input type="date" id="cf_date_to" onchange="filterCommissions()" style="padding:6px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:130px" title="创建时间至">' +
    '<button class="btn btn-primary" onclick="showCommissionForm()">新建委托</button>' +
    '</div>';
}

function filterCommissions() {
  var id = (document.getElementById('cf_id').value || '').toLowerCase();
  var client = (document.getElementById('cf_client').value || '').toLowerCase();
  var domain = document.getElementById('cf_domain').value;
  var status = document.getElementById('cf_status').value;
  var dateFrom = document.getElementById('cf_date_from').value;
  var dateTo = document.getElementById('cf_date_to').value;
  commFilteredData = DELEGATES.filter(function(d) {
    if (id && d.id.toLowerCase().indexOf(id) < 0) return false;
    if (client && d.client.toLowerCase().indexOf(client) < 0) return false;
    if (domain && d.domains.indexOf(domain) < 0) return false;
    if (status && d.status !== status) return false;
    if (dateFrom && d.createDate < dateFrom) return false;
    if (dateTo && d.createDate > dateTo) return false;
    return true;
  });
  commPage = 1;
  document.getElementById('content').innerHTML = renderCommissionList();
}

    { l: '联系人', r: 1, h: '<input id="cf_contact" value="' + (init.contact || '') + '" placeholder="请输入联系人">' },
    { l: '联系方式', r: 1, h: '<input id="cf_phone" value="' + (init.phone || '') + '" placeholder="请输入联系方式">' },
    { l: '委托方地址', r: 1, h: '<input id="cf_address" value="' + (init.address || '') + '" placeholder="请输入委托方地址">' },
    { l: '检测对象名称及版本', r: 1, h: '<input id="cf_objNameVer" value="' + (init.objNameVer || '') + '" placeholder="请输入检测对象名称及版本">' },
    { l: '检测内容', r: 1, h: '<textarea id="cf_testContent" rows="2" placeholder="检测内容描述">' + (init.testContent || '') + '</textarea>' },
    { l: '检测领域', r: 1, h: '<input type="hidden" id="cf_domains" data-sel=\'' + JSON.stringify(selDomains) + '\' data-opts=\'' + JSON.stringify(dOpts) + '\'>' + multiSelectHtml('cf_domains', selDomains, dOpts, '点击选择检测领域（至少选1个）') },
    { l: '检测依据', r: 1, h: '<input id="cf_standards" value="' + (init.standards || '') + '" placeholder="如 GB/T 25000.51-2016">' },

    { l: '特殊要求/说明', r: 1, h: '<textarea id="cf_specialReq" placeholder="无特殊要求可不填">' + (init.specialReq || '') + '</textarea>' },
    { l: '附件上传', r: 1, h: '<input type="file" id="cf_attachment" style="padding:6px"><br><small style="color:#999">支持上传合同、技术要求等文件（上限10MB）</small><div id="cf_existing_attachment" style="font-size:12px;color:#1890ff;margin-top:4px">' + (init.attachments && init.attachments.length > 0 ? '📎 已有附件：' + init.attachments.join('、') : '') + '</div>' }

    '<button class="btn btn-default" onclick="saveCommissionDraft(\'' + (editId || '') + '\')">保存草稿</button>' +
    '<button class="btn btn-primary" onclick="submitCommission(\'' + (editId || '') + '\')">提交审批</button>';

function onContractSelect() {
  var cid = document.getElementById('cf_contract').value;
  var clientEl = document.getElementById('cf_client2');
  var contactEl = document.getElementById('cf_contact');
  var phoneEl = document.getElementById('cf_phone');
  var addrEl = document.getElementById('cf_address');
  var objEl = document.getElementById('cf_objNameVer');
  var testEl = document.getElementById('cf_testContent');
  var stdEl = document.getElementById('cf_standards');
  var dlEl = document.getElementById('cf_deadline');
  if (!cid) {
    clientEl.value = ''; clientEl.readOnly = false; clientEl.style.background = '';
    contactEl.value = ''; phoneEl.value = ''; addrEl.value = '';
    objEl.value = ''; testEl.value = ''; stdEl.value = ''; dlEl.value = fmt(NOW);
    return;
  }
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (c) {
    clientEl.value = c.client; clientEl.readOnly = true; clientEl.style.background = '#f5f5f5';
    var r = REVIEWS.filter(function(x) { return x.id === c.reviewId; })[0];
    if (r) {
      contactEl.value = r.contact || ''; phoneEl.value = r.phone || '';
      objEl.value = r.proj || '';
      testEl.value = r.testContent || '';
      stdEl.value = r.standardBasis || '';
    }
    dlEl.value = c.servicePeriod || fmt(NOW);
    // 委托方地址：从同客户的已有委托中获取
    var existing = DELEGATES.filter(function(d) { return d.client === c.client && d.address; });
    addrEl.value = existing.length > 0 ? existing[0].address : '';
  }
}

function saveCommissionDraft(editId) {
  var data = collectCommissionForm(editId);
  if (!data) return;
  data.status = '待审批';
  if (!data.createDate) data.createDate = fmt(NOW);
  if (!data.creator) data.creator = LOGIN_USER;

  if (editId) {
    var idx = -1;
    DELEGATES.forEach(function(d, i) { if (d.id === editId) idx = i; });
    if (idx >= 0) { DELEGATES[idx] = data; }
  } else {
    DELEGATES.push(data);
    updateContractDelegateCount(data.contractId);
  }
  closeModal();
  navTo('commission');
  alert('委托已保存为草稿！编号：' + data.id);
}

function submitCommission(editId) {
  var data = collectCommissionForm(editId);
  if (!data) return;

  if (editId) {
    var d = DELEGATES.filter(function(x) { return x.id === editId; })[0];
    if (d && d.status !== '待审批' && d.status !== '不通过') {
      alert('仅待审批/不通过状态可提交审批');
      return;
    }
  }

  data.status = '审批中';
  if (!data.createDate) data.createDate = fmt(NOW);
  if (!data.creator) data.creator = LOGIN_USER;

  if (editId) {
    var idx = -1;
    DELEGATES.forEach(function(d, i) { if (d.id === editId) idx = i; });
    if (idx >= 0) { DELEGATES[idx] = data; }
  } else {
    DELEGATES.push(data);
    updateContractDelegateCount(data.contractId);
  }
  // 弹出选择审批人
  showApproverSelect(data.id);
}

// 选择审批人弹窗
function showApproverSelect(delegateId) {
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  if (!d) return;
  var existing = d.approvers || [];
  var existingNames = existing.map(function(a) { return a.name; });
  // 模拟人员列表
  var allPersons = [
    { name: '张工', role: '质量负责人' },
    { name: '李工', role: '部门负责人' },
    { name: '赵工', role: '技术负责人' },
    { name: '王工', role: '授权签字人' },
    { name: '周工', role: '测试工程师' }
  ];
  var checkboxes = allPersons.map(function(p, i) {
    var checked = existingNames.indexOf(p.name) >= 0 ? ' checked' : '';
    return '<label style="display:block;padding:6px 0;cursor:pointer"><input type="checkbox" id="aprv_' + i + '" value="' + p.name + '" data-role="' + p.role + '"' + checked + '> ' + p.name + '（' + p.role + '）</label>';
  }).join('');

  var body = '<p style="margin-bottom:12px;color:#666;font-size:13px">委托编号：<b>' + d.id + '</b> &nbsp;|&nbsp; 委托方：<b>' + d.client + '</b></p>' +
    '<p style="margin-bottom:12px;color:#ff4d4f;font-size:12px">⚠ 必须包含技术负责人和部门负责人</p>' +
    '<div style="max-height:300px;overflow-y:auto;border:1px solid #f0f0f0;border-radius:6px;padding:8px 16px">' + checkboxes + '</div>';

  var footer = '<button class="btn btn-default" onclick="closeModal();navTo(\'commission\')">取消</button>' +
    '<button class="btn btn-primary" onclick="confirmApprovers(\'' + delegateId + '\')">确认提交</button>';

  showModal('选择审批人', body, footer);
}

function confirmApprovers(delegateId) {
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  if (!d) return;
  var approvers = [];
  var boxes = document.querySelectorAll('#modalBody input[type="checkbox"]:checked');
  boxes.forEach(function(cb) {
    approvers.push({ name: cb.value, role: cb.getAttribute('data-role'), result: '', comment: '', items: {} });
  });
  if (approvers.length === 0) { alert('请至少选择1位审批人'); return; }
  var hasTech = approvers.some(function(a) { return a.role === '技术负责人'; });
  var hasDept = approvers.some(function(a) { return a.role === '部门负责人'; });
  if (!hasTech || !hasDept) { alert('必须包含技术负责人和部门负责人'); return; }

  d.approvers = approvers;
  d.approvalConclusion = '';
  closeModal();
  navTo('commission');
  renderNav();
  alert('已提交审批！委托编号：' + d.id + '\n已向 ' + approvers.map(function(a) { return a.name; }).join('、') + ' 发送审批工单');
}

function collectCommissionForm(editId) {
  var domains = getMultiSelectValues('cf_domains');
  if (domains.length === 0) { alert('请至少选择1个检测领域'); return null; }
  var objNameVer = document.getElementById('cf_objNameVer').value.trim();
  if (!objNameVer) { alert('请输入检测对象名称及版本'); return null; }
  var client = document.getElementById('cf_client2').value.trim();
  if (!client) { alert('请输入委托方名称'); return null; }

  var delegateId = document.getElementById('cf_id').value.trim();
  if (!delegateId) { alert('请输入委托编号'); return null; }
  // 唯一性校验：排除自身编辑场景
  var dup = DELEGATES.filter(function(d) { return d.id === delegateId && d.id !== (editId || ''); });
  if (dup.length > 0) { alert('委托编号已存在：' + delegateId + '，请使用其他编号'); return null; }

  var contractId = document.getElementById('cf_contract').value;
  var existing = editId ? DELEGATES.filter(function(x) { return x.id === editId; })[0] : null;

  // 附件处理
  var attachments = (existing && existing.attachments) ? existing.attachments.slice() : [];
  var attFile = document.getElementById('cf_attachment');
  if (attFile && attFile.files && attFile.files[0]) { attachments.push(attFile.files[0].name); }

  return {
    id: delegateId,
    contractId: contractId || (existing ? existing.contractId : ''),
    client: client,
    contact: document.getElementById('cf_contact').value.trim(),
    phone: document.getElementById('cf_phone').value.trim(),
    address: document.getElementById('cf_address').value.trim(),
    objNameVer: objNameVer,
    testContent: document.getElementById('cf_testContent').value.trim(),
    domains: domains,
    standards: document.getElementById('cf_standards').value.trim(),
    deadline: document.getElementById('cf_deadline').value.trim(),
    specialReq: document.getElementById('cf_specialReq').value.trim(),
    attachments: attachments,
    status: existing ? existing.status : '待审批',
    createDate: existing ? existing.createDate : '',
    creator: existing ? existing.creator : ''
  };
}

function generateDelegateId() {
  var today = fmt(NOW);
  var prefix = "TZJC/JSJL-" + today + ".WTSQ-";
  var sameDay = DELEGATES.filter(function(d) { return d.id.indexOf(prefix) === 0; });
  return prefix + (sameDay.length + 1);
}

function updateContractDelegateCount(cid) {
  if (!cid) return;
  var c = CONTRACTS.filter(function(x) { return x.id === cid; })[0];
  if (c) {
    c.delegateCount = DELEGATES.filter(function(d) { return d.contractId === cid; }).length;
  }
}

function deleteCommission(id) {
  var d = DELEGATES.filter(function(x) { return x.id === id; })[0];
  if (!d) return;
  if (d.status !== '待审批') { alert('仅可删除待审批状态的委托'); return; }
  if (!confirm('确定删除委托 ' + id + ' 吗？此操作不可恢复。')) return;
  var cid = d.contractId;
  DELEGATES = DELEGATES.filter(function(x) { return x.id !== id; });
  if (cid) updateContractDelegateCount(cid);
  navTo('commission');
}

// 重新发起委托（不通过后）
function refireCommission(id) {
  var d = DELEGATES.filter(function(x) { return x.id === id; })[0];
  if (!d) return;
  if (d.status !== '不通过' && d.approvalConclusion !== '不通过') { alert('仅可重新发起审批不通过的委托'); return; }
  if (!confirm('确定基于 ' + id + ' 重新发起委托吗？将生成新委托编号，原审批记录不再保留。')) return;

  var newId = generateDelegateId();
  var newDelegate = {
    id: newId, contractId: d.contractId, client: d.client,
    contact: d.contact, phone: d.phone, address: d.address,
    objNameVer: d.objNameVer, testContent: d.testContent,
    domains: d.domains.slice(), standards: d.standards,
    deadline: d.deadline, specialReq: d.specialReq,
    attachments: d.attachments ? d.attachments.slice() : [],
    status: '待审批', createDate: fmt(NOW), creator: LOGIN_USER,
    approvers: [], approvalConclusion: ''
  };
  DELEGATES.push(newDelegate);
  if (d.contractId) updateContractDelegateCount(d.contractId);
  navTo('commission');
  alert('已重新发起委托！新编号：' + newId);
}

    '<tr><td><b>附件</b></td><td>' + (d.attachments && d.attachments.length > 0 ? d.attachments.map(function(a) { return '📎 ' + a; }).join('<br>') : '<span style="color:#999">无附件</span>') + '</td></tr>';

  if (d.approvers && d.approvers.length > 0) {
    var approverInfo = d.approvers.map(function(av) {
      var label = av.result === '不通过' ? '<span style="color:#ff4d4f">✗ ' + av.result + '</span>' : (av.result || '未填写');
      return av.name + '（' + av.role + '）：' + label;
    }).join('<br>');
    rows += '<tr><td><b>审批人</b></td><td>' + approverInfo + '</td></tr>';
    // 不通过时展示拒绝原因
    var rejected = d.approvers.filter(function(av) { return av.result === '不通过'; });
    if (rejected.length > 0) {
      var rejectDetail = rejected.map(function(av) {
        var failItems = [];
        if (av.items) {
          ITEM_KEYS.forEach(function(k) { if (av.items[k] === '否') failItems.push(ITEM_LABELS[k].replace('是否', '').replace('满足', '')); });
        }
        return '<div style="margin-bottom:6px;padding:6px 10px;background:#fff2f0;border-left:3px solid #ff4d4f;border-radius:3px;font-size:12px">' +
          '<b>' + av.name + '</b>（' + av.role + '）不通过' +
          (failItems.length > 0 ? '<br><span style="color:#666">不满足项：</span>' + failItems.join('、') : '') +
          (av.comment ? '<br><span style="color:#666">原因：</span>' + av.comment : '') +
          '</div>';
      }).join('');
      rows += '<tr><td><b>不通过详情</b></td><td>' + rejectDetail + '</td></tr>';
    }
  }

  showModal('委托详情 - ' + d.id,
    '<table class="ws-form-table">' + rows + '</table>',
    '<button class="btn btn-default" onclick="closeModal()">关闭</button>' +
    (d.status === '审批中' ? '<button class="btn btn-primary" onclick="closeModal();viewApprovalWorksheet(\'' + delegateId + '\')">查看审批进度</button>' : '') +
    (d.status === '不通过' ? '<button class="btn btn-primary" onclick="closeModal();viewApprovalWorksheet(\'' + delegateId + '\')">查看审批工单</button>' : '')
  );
}

// ============================================================
// 1.3 委托审批 - 审批工单总览（先看进度再填）
// ============================================================
function viewApprovalWorksheet(delegateId) {
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  if (!d) return;
  document.querySelector('.modal').classList.add('modal-wide');

  var leftHtml = '<div class="ws-left">' + delegateDetailTable(d) + '</div>';
  var rightHtml;

  if (d.status === '已通过' || d.status === '不通过') {
    // 已完成：展示各审批人明细（对齐合同评审样式）
    var tables = d.approvers.map(function(av) {
      var rows = ITEM_KEYS.map(function(k) {
        return '<tr><td>' + ITEM_LABELS[k] + '</td><td>' + ((av.items && av.items[k]) || '-') + '</td></tr>';
      }).join('');
      return '<div style="margin-bottom:12px;border:1px solid #f0f0f0;border-radius:6px;overflow:hidden">' +
        '<div style="padding:6px 10px;background:#fafafa;font-weight:bold;font-size:13px">' + av.name + '（' + av.role + '）— ' + statusTag(av.result || '未填写') +
        (av.comment ? ' <span style="color:#999;font-weight:normal;font-size:11px">' + av.comment + '</span>' : '') + '</div>' +
        '<table class="review-items-table">' + rows + '</table></div>';
    }).join('');
    rightHtml = '<div class="ws-right"><div class="ws-right-title">审批明细（已完成）</div>' + tables + '</div>';
  } else {
    // 审批中：展示各审批人填写进度（对齐合同评审样式）
    var rows = d.approvers.map(function(av) {
      var filled = av.result ? true : false;
      var isMe = av.name === LOGIN_USER;
      var btnHtml = isMe
        ? '<button class="btn btn-primary btn-sm" onclick="fillApprovalWorkOrder(\'' + delegateId + '\')">' + (filled ? '修改' : '填写') + '</button>'
        : (filled ? statusTag(av.result) : '<span style="color:#bbb;font-size:11px">等待填写</span>');
      return '<tr><td>' + av.name + '</td><td>' + av.role + '</td>' +
        '<td>' + (filled ? statusTag(av.result) : '<span style="color:#999">未填写</span>') + '</td>' +
        '<td>' + btnHtml + '</td></tr>';
    }).join('');
    var allFilled = d.approvers.every(function(av) { return !!av.result; });
    rightHtml = '<div class="ws-right"><div class="ws-right-title">审批人填写进度</div>' +
      '<table><thead><tr><th>审批人</th><th>角色</th><th>结论</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      (allFilled ? '<div style="margin-top:16px;text-align:center"><button class="btn btn-warning" onclick="finalizeApproval(\'' + delegateId + '\')">汇总审批结论</button></div>' : '') +
      '</div>';
  }

  showModal('委托审批工单 - ' + d.id, '<div class="ws-layout">' + leftHtml + rightHtml + '</div>');
  setTimeout(function() { document.querySelector('.modal').classList.remove('modal-wide'); }, 100);
}

// ============================================================
// 1.3 委托审批 - 填写审批工单
// ============================================================
function fillApprovalWorkOrder(delegateId) {
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  if (!d) return;
  var av = d.approvers.filter(function(a) { return a.name === LOGIN_USER; })[0];
  if (!av) { alert('您不是该委托的审批人'); return }
  document.querySelector('.modal').classList.add('modal-wide');

  var itemFields = ITEM_KEYS.map(function(k) {
    return { l: ITEM_LABELS[k], r: 1, h: makeSelect('apv_' + k, ['是', '否'], (av.items && av.items[k]) || '') };
  });

  var leftHtml = '<div class="ws-left">' + delegateDetailTable(d) + '</div>';
  var formHtml = makeForm(itemFields.concat([
    { l: '审批结论', r: 1, h: makeSelect('apv_conclusion', ['通过', '不通过'], av.result || '') },
    { l: '不通过原因', h: '<textarea id="apv_comment" rows="2" placeholder="不通过时请填写原因">' + (av.comment || '') + '</textarea>' }
  ]));
  var rightHtml = '<div class="ws-right"><div class="ws-right-title">填写审批 — ' + av.name + '（' + av.role + '）</div>' + formHtml + '</div>';

  var footer = '<button class="btn btn-primary" onclick="submitApprovalItem(\'' + delegateId + '\')">保存</button>';
  showModal('填写审批工单 — ' + av.name, '<div class="ws-layout">' + leftHtml + rightHtml + '</div>', footer);
  setTimeout(function() { document.querySelector('.modal').classList.remove('modal-wide'); }, 100);
}

function submitApprovalItem(delegateId) {
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  var av = d.approvers.filter(function(a) { return a.name === LOGIN_USER; })[0];
  var conclusion = document.getElementById('apv_conclusion').value;
  var comment = document.getElementById('apv_comment').value.trim();

  if (conclusion === '不通过' && !comment) {
    alert('不通过时必须填写不通过原因');
    return;
  }

  av.result = conclusion;
  av.comment = comment;
  av.processTime = new Date().toISOString().slice(0, 10);
  if (!av.items) av.items = {};
  ITEM_KEYS.forEach(function(k) {
    av.items[k] = document.getElementById('apv_' + k).value;
  });
  closeModal();
  viewApprovalWorksheet(delegateId);
  renderNav();
  alert('审批工单已保存！');
}

function finalizeApproval(delegateId) {
  if (LOGIN_USER !== '张工') { alert('仅质量负责人可汇总审批结论'); return; }
  var d = DELEGATES.filter(function(x) { return x.id === delegateId; })[0];
  var unfilled = d.approvers.filter(function(av) { return !av.result; });
  if (unfilled.length > 0) {
    alert('以下审批人尚未填写：' + unfilled.map(function(av) { return av.name; }).join('、'));
    return;
  }
  var allPass = d.approvers.every(function(av) { return av.result === '通过'; });
  d.approvalConclusion = allPass ? '通过' : '不通过';
  d.status = allPass ? '已通过' : '不通过';
  closeModal();
  renderNav();
  if (allPass) {
    alert('全员通过！委托审批已通过，通知创建人新建检测任务。');
  } else {
    var failNames = d.approvers.filter(function(av) { return av.result === '不通过'; }).map(function(av) { return av.name; }).join('、');
    alert('审批不通过！不通过人员：' + failNames + '。委托不通过。');
  }
  navTo('commission');
}

// ============================================================
// 1.4 委托审批 - 列表页
// ============================================================
function pageApproval() {

  var list = DELEGATES.slice();

    var c = CONTRACTS.filter(function(x) { return x.id === d.contractId; })[0];
    var contractDisplay = c ? c.id : '独立委托';

    var approverInfo = '';

      '<input placeholder="委托编号" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:200px">' +
      '<input placeholder="委托方名称" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:160px">' +
      '<select style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">审批结论-全部</option><option value="通过">通过</option><option value="不通过">不通过</option></select>' +
      '<button class="btn btn-primary" style="padding:6px 14px">🔍 查询</button>' +
      '<span style="margin-left:auto;color:#666;font-size:13px">共 <b>' + list.length + '</b> 条</span>' +
    '</div>' +
    '<table><thead><tr>' +
    '<th>委托编号</th><th>委托方名称</th><th>关联合同</th><th>检测领域</th><th>审批结论</th><th>审批人</th><th>创建时间</th><th>操作</th>' +
    '</tr></thead><tbody>' + (list.length ? rows : '<tr><td colspan="8" style="text-align:center;color:#999;padding:30px">暂无审批记录</td></tr>') + '</tbody></table></div>';
}

// ============================================================
// 任务列表页面 (2.1)
// ============================================================
function pageTask() {
  var filterId = '', filterClient = '', filterDomain = '', filterStage = '', filterInspector = '';
  
  function getBaseData() {
    if (taskTab === 'active') return TASKS.filter(function(t) { return t.status === '进行中'; });
    return TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档'; });
  }

  function doFilter() {
    filterId = (document.getElementById('task_filter_id')||{}).value || '';
    filterClient = (document.getElementById('task_filter_client')||{}).value || '';
    filterDomain = (document.getElementById('task_filter_domain')||{}).value || '';
    filterStage = (document.getElementById('task_filter_stage')||{}).value || '';
    filterInspector = (document.getElementById('task_filter_inspector')||{}).value || '';
    var base = getBaseData();
    var f = base.filter(function(t) {
      if (filterId && t.id.indexOf(filterId) === -1) return false;
      if (filterClient && t.client.indexOf(filterClient) === -1) return false;
      if (filterDomain && t.domain !== filterDomain) return false;
      if (filterStage && t.currentStage !== filterStage) return false;
      if (filterInspector && (t.inspector||'待分配').indexOf(filterInspector) === -1) return false;
      return true;
    });
    taskFiltered = f;
    refreshTaskTable();
  }

  function rowHtml(t) {
    var domainLabel = DOMAIN_LABELS[t.domain] || t.domain;
    var inspectorDisplay = t.inspector || '<span style="color:#999">待分配</span>';
    var ops = '<button class="btn btn-primary btn-sm" onclick="viewTaskDetail(\'' + t.id + '\')">查看详情</button>';
    if (t.reviewId) {
      ops += ' <button class="btn btn-default btn-sm" onclick="viewReviewDetail(\'' + t.reviewId + '\')">查看委托</button>';
    }
    return '<tr><td>' + t.id + '</td><td>' + (t.delegateId||'-') + '</td><td>' + t.client + '</td>' +
      '<td>' + domainLabel + '</td><td>' + t.obj + '</td><td>' + t.currentStage + '</td>' +
      '<td>' + inspectorDisplay + '</td><td>' + statusTag(t.status) + '</td>' +
      '<td>' + (t.planEnd||'-') + '</td><td>' + ops + '</td></tr>';
  }

  function refreshTaskTable() {
    var rows = taskFiltered.map(rowHtml).join('');
    var tbody = document.getElementById('task_tbody');
    if (tbody) tbody.innerHTML = rows || '<tr><td colspan="10" style="text-align:center;color:#999;padding:30px">无匹配任务</td></tr>';
    var el = document.getElementById('task_count');
    if (el) el.innerHTML = '共 <b>' + taskFiltered.length + '</b> 条';
  }

  var domainOpts = DOMAINS.map(function(d) { return '<option value="' + d + '">' + DOMAIN_LABELS[d] + '</option>'; }).join('');
  var stageOpts = STAGES.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');

  var activeCount = TASKS.filter(function(t) { return t.status === '进行中'; }).length;
  var doneCount = TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档'; }).length;

  taskTab = 'active';
  taskFiltered = getBaseData();
  var initialRows = taskFiltered.map(rowHtml).join('');

  setTimeout(function() {
    document.getElementById('task_filter_id').oninput = doFilter;
    document.getElementById('task_filter_client').oninput = doFilter;
    document.getElementById('task_filter_domain').onchange = doFilter;
    document.getElementById('task_filter_stage').onchange = doFilter;
    document.getElementById('task_filter_inspector').oninput = doFilter;
  }, 10);

  return '<div class="card"><div class="card-title">检测任务列表</div>' +
    '<div style="margin-bottom:4px">' +
      '<button id="task_tab_active" class="btn btn-primary btn-sm" onclick="switchTaskTab(\'active\')">🔄 进行中 (' + activeCount + ')</button> ' +
      '<button id="task_tab_done" class="btn btn-default btn-sm" onclick="switchTaskTab(\'done\')">✅ 已完成 (' + doneCount + ')</button>' +
    '</div>' +
    '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px">' +
      '<input id="task_filter_id" placeholder="任务编号" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:200px">' +
      '<input id="task_filter_client" placeholder="委托方" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:150px">' +
      '<select id="task_filter_domain" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">检测领域-全部</option>' + domainOpts + '</select>' +
      '<select id="task_filter_stage" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px"><option value="">当前阶段-全部</option>' + stageOpts + '</select>' +
      '<input id="task_filter_inspector" placeholder="主检人" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;width:120px">' +
      '<button class="btn btn-primary" onclick="openNewTaskModal()">+ 新建任务</button>' +
      '<span id="task_count" style="margin-left:auto;color:#666;font-size:13px">共 <b>' + taskFiltered.length + '</b> 条</span>' +
    '</div>' +
    '<table><thead><tr>' +
    '<th>任务编号</th><th>关联委托</th><th>委托方</th><th>检测领域</th><th>检测对象</th><th>当前阶段</th><th>主检人</th><th>任务状态</th><th>计划完成</th><th>操作</th>' +
    '</tr></thead><tbody id="task_tbody">' + initialRows + '</tbody></table></div>';
}

var taskTab = 'active', taskFiltered = [];
function switchTaskTab(tab) {
  taskTab = tab;
  document.getElementById('task_tab_active').className = tab === 'active' ? 'btn btn-primary btn-sm' : 'btn btn-default btn-sm';
  document.getElementById('task_tab_done').className = tab === 'done' ? 'btn btn-primary btn-sm' : 'btn btn-default btn-sm';
  // 清空筛选条件
  var els = ['task_filter_id','task_filter_client','task_filter_domain','task_filter_stage','task_filter_inspector'];
  els.forEach(function(id) { var e = document.getElementById(id); if (e) e.value = ''; });
  // 重新过滤
  var base = tab === 'active' ? TASKS.filter(function(t) { return t.status === '进行中'; }) : TASKS.filter(function(t) { return t.status === '已完成' || t.status === '已归档'; });
  taskFiltered = base;
  var rows = taskFiltered.map(function(t) {
    var domainLabel = DOMAIN_LABELS[t.domain] || t.domain;
    var inspectorDisplay = t.inspector || '<span style="color:#999">待分配</span>';
    var ops = '<button class="btn btn-primary btn-sm" onclick="viewTaskDetail(\'' + t.id + '\')">查看详情</button>';
    if (t.reviewId) ops += ' <button class="btn btn-default btn-sm" onclick="viewReviewDetail(\'' + t.reviewId + '\')">查看委托</button>';
    return '<tr><td>' + t.id + '</td><td>' + (t.delegateId||'-') + '</td><td>' + t.client + '</td>' +
      '<td>' + domainLabel + '</td><td>' + t.obj + '</td><td>' + t.currentStage + '</td>' +
      '<td>' + inspectorDisplay + '</td><td>' + statusTag(t.status) + '</td>' +
      '<td>' + (t.planEnd||'-') + '</td><td>' + ops + '</td></tr>';
  }).join('');
  var tbody = document.getElementById('task_tbody');
  if (tbody) tbody.innerHTML = rows || '<tr><td colspan="10" style="text-align:center;color:#999;padding:30px">无匹配任务</td></tr>';
  var el = document.getElementById('task_count');
  if (el) el.innerHTML = '共 <b>' + taskFiltered.length + '</b> 条';
}

function viewTaskDetail(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  var phaseOrder = ['A','B','C','D','E','F'];
  var phaseLabels = { A: '前期准备', B: '方案阶段', C: '实施阶段', D: '问题处理', E: '报告阶段', F: '结项' };
  var curPhase = STAGE_PHASE[t.currentStage] || 'A';
  var curPhaseIdx = phaseOrder.indexOf(curPhase);
  
  var progressHtml = phaseOrder.map(function(p, i) {
    var cls = '';
    if (i < curPhaseIdx) cls = 'done';
    else if (i === curPhaseIdx) cls = 'current';
    else cls = 'pending';
    var arrow = i < phaseOrder.length - 1 ? '<span style="margin:0 4px;color:#d9d9d9">→</span>' : '';
    return '<span class="phase-dot phase-' + cls + '" style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;font-size:12px;' +
      (cls==='done'?'background:#f6ffed;color:#52c41a':'') +
      (cls==='current'?'background:#e6f7ff;color:#1890ff;font-weight:bold':'') +
      (cls==='pending'?'background:#fafafa;color:#bbb':'') +
    '">' + phaseLabels[p] + ' [' + p + ']</span>' + arrow;
  }).join('');
  
  var historyHtml = t.stageHistory.map(function(h) {
    var extra = '';
    if (h.inspector) extra += ' | 主检人: ' + h.inspector;
    if (h.reviewer) extra += ' | 复核人: ' + h.reviewer;
    if (h.file) extra += ' | 文件: ' + h.file;
    if (h.result) extra += ' | 结果: ' + h.result;
    return '<tr><td>' + h.stage + '</td><td>' + h.date + '</td><td>' + h.operator + '</td><td>' + extra.replace(/^\s*\|\s*/, '') + '</td></tr>';
  }).join('');

  var body = '<div style="margin-bottom:16px"><b>任务基本信息</b></div>' +
    '<table class="review-items-table"><tr><td>任务编号</td><td>' + t.id + '</td><td>委托方</td><td>' + t.client + '</td></tr>' +
    '<tr><td>项目名称</td><td>' + t.proj + '</td><td>检测对象</td><td>' + t.obj + '</td></tr>' +
    '<tr><td>检测领域</td><td>' + (DOMAIN_LABELS[t.domain]||t.domain) + '</td><td>任务状态</td><td>' + statusTag(t.status) + '</td></tr>' +
    '<tr><td>主检人</td><td>' + (t.inspector||'待分配') + '</td><td>复核人</td><td>' + (t.reviewer||'待分配') + '</td></tr>' +
    '<tr><td>计划开始</td><td>' + (t.planStart||'-') + '</td><td>计划完成</td><td>' + (t.planEnd||'-') + '</td></tr></table>' +
    '<div style="margin:16px 0"><b>阶段进度</b></div>' +
    '<div style="padding:12px;background:#fafafa;border-radius:6px;overflow-x:auto;white-space:nowrap">' + progressHtml + '</div>' +
    '<div style="margin:16px 0"><b>流转记录</b></div>' +

function stageReceiveSample(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t || t.currentStage !== '样品接收') return;
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  t.stageHistory.push({ stage: '样品接收', date: ds, operator: LOGIN_USER });
  t.currentStage = '任务派工';
  alert('【原型演示】样品已确认接收！\n进入下一阶段：任务派工');
  closeModal();
  renderPage();
}

function confirmTaskAssign(taskId) {
  var t = TASKS.filter(function(x) { return x.id === taskId; })[0];
  if (!t) return;
  var inspector = document.getElementById('assign_inspector').value;
  var reviewer = document.getElementById('assign_reviewer').value;
  var planStart = document.getElementById('assign_planStart').value;
  var planEnd = document.getElementById('assign_planEnd').value;
  
  if (!inspector) { alert('请选择主检人员'); return; }
  if (!reviewer) { alert('请选择复核人员'); return; }
  if (inspector === reviewer) { alert('主检人和复核人不能同一人！'); return; }
  
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  t.inspector = inspector;
  t.reviewer = reviewer;
  if (planStart) t.planStart = planStart;
  if (planEnd) t.planEnd = planEnd;
  t.stageHistory.push({ stage: '任务派工', date: ds, operator: LOGIN_USER, inspector: inspector, reviewer: reviewer });
  t.currentStage = '测试方案';
  
  alert('【原型演示】派工完成！\n主检人：' + inspector + ' | 复核人：' + reviewer + '\n进入下一阶段：测试方案（B.方案阶段）');
  closeModal();
  renderPage();
}

      '<tr><td>监督内容</td><td colspan="3">' + (s.content||'-') + '</td></tr>' +
      '<tr><td>是否发现问题</td><td>' + (s.hasIssue ? '是' : '否') + '</td><td>监督结论</td><td>' + (s.conclusion||'-') + '</td></tr>' +
      (s.hasIssue ? '<tr><td>问题描述</td><td colspan="3">' + (s.problemDesc||'-') + '</td></tr>' : '') +
      '<tr><td>处理建议</td><td colspan="3">' + (s.suggestion||'-') + '</td></tr>' +
      (s.conclusion === '需整改' ? '<tr><td>整改情况</td><td colspan="3">' + (s.rectification||'待整改') + '</td></tr>' : '') +
      '</table>';
    
    showModal('监督详情 — ' + s.id, body, '<button class="btn btn-default" onclick="closeModal()">关闭</button>');
  }
}

function confirmSupervision(supId) {
  alert('【原型演示】监督工单提交成功！\n（实际开发中此处会保存监督数据并更新监督状态）');
  closeModal();
}

// ============================================================
renderNav();
renderPage();
</script>
